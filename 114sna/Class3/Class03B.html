<h2 id="network-sementation">Network Sementation</h2>

<p>Network <strong>segmentation</strong> refers to dividing a graph into meaningful substructures, often to reveal how the network is organized at different scales: global (whole network), mesoscale (groups), and local (small patterns). 網路<strong>細分</strong>（segmentation）是指將圖劃分為具有實際意義的子結構，通常用於揭示網路在不同尺度下的組織方式：全域（整個網路）、中觀尺度（群體）和局部（小型模式）。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-scope-rQ1sgOS2="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="3" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p><code>網路凝聚力</code>是指相對於網路圖中定義邊的關係而言，頂點子集的凝聚程度--或者說 &quot;粘在一起 &quot;的程度。</p>
<p><code>Cohesive groups</code> are communities in which the nodes (members) are connected to others in the same group more frequent than they are to those who are outside of the group, allowing all of the members of the group to reach each other. 在這種群體中，節點（成員）與同一群體中其他人的聯繫比與群體外其他人的聯繫更頻繁，從而使群體中的所有成員都能相互聯繫。</p>
<p>Within such a highly cohesive group, members tend to have strong <code>homogenous beliefs</code>. 在這樣一個具有高度凝聚力的群體中，成員往往具有強烈的同質信仰。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-scope-4eoFFicE="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="4" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h4 id="giant-component-%E5%B7%A8%E9%80%A3%E9%80%9A%E5%88%86%E9%87%8F">Giant Component 巨連通分量</h4>

<p>The <strong>giant component</strong> is a foundational concept that captures a critical transition in network connectivity. The giant component stands out because it typically contains a <em>finite fraction</em> of all nodes in the network (e.g., 60%, 80%, or more), especially as the network grows large. <strong>巨連通分量</strong>（giant component）都是一個核心概念，它揭示了網路連通性發生<strong>質變</strong>的關鍵時刻。巨連通分量之所以特殊，在於它通常包含了網路中<strong>相當大比例的節點</strong>（例如60%、80%甚至更多），尤其是在網路規模較大時。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-ztZsW9KJ="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p>這一現象最早在<strong>Erdős–Rényi</strong> <strong>隨機圖模型</strong>中被嚴格描述：</p>
<ul>
<li>
<p>When the average number of connections per node (the expected degree, often denoted ⟨k⟩) is <strong>below 1</strong>, the network consists almost entirely of tiny, isolated fragments. 當每個節點的平均連接數（即平均度 ⟨k⟩）<strong>小於1</strong>時，網路幾乎完全由微小、孤立的碎片組成，無法形成長距離連接；</p>
</li>
<li>
<p>When ⟨k⟩ <strong>exceeds 1</strong>, a giant component <strong>abruptly appears</strong>, absorbing a growing proportion of nodes as connectivity increases. 當平均度<strong>超過1</strong>時，一個巨連通分量會<strong>突然出現</strong>，並隨著連接密度的增加而迅速吸收更多節點。</p>
</li>
<li></li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-lROcDKEG="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="6" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<ul>
<li>
<p>Consider a social network like Facebook: early on, users formed small friend groups with little overlap. 以 Facebook 為例：早期用戶僅形成小規模的朋友圈，彼此孤立。</p>
</li>
<li>
<p>As more users joined and friend links accumulated, a <strong>giant component emerged</strong>—eventually linking billions of people into a single, traversable web. 隨著使用者數量激增和好友連接不斷累積，網路中逐漸<strong>湧現出一個巨連通分量</strong>——最終將數十億用戶納入一張可遍歷的連接之網。</p>
</li>
<li>
<p>If you can find a path (however long) from any user to almost any other, you’re witnessing the giant component in action. 如果你能（無論路徑多長）從任意一位用戶找到通向幾乎所有其他使用者的路徑，那你所觀察到的正是 巨連通分量的實際體現。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-marpit-scope-WplhUQ2F="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="7" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h4 id="k-core-k-%E6%A0%B8"><strong>K-Core K 核</strong></h4>

<p>A subgraph where every node has <code>at least degree k</code> within the subgraph (mesoscale/global decomposition). 指網路中的一個子圖，其中每個節點在該子圖內的度數至少為 <em>k</em>（中觀/全域分解）。</p>
<p>k-Core decomposition peels the network layer-by-layer (onion-like structure) by removing low-degree nodes, revealing a hierarchical <strong>core-periphery organization</strong>. k-核分解 通過逐層剔除低度節點（類似剝洋蔥的結構），揭示出網路的層級化 <strong>核心—邊緣組織</strong>。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-marpit-scope-ubMfvHtn="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="8" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p>These subgraphs are <code>not necessarily cohesive groups</code>, but they can tell about the areas which contain clique-like structures. 這些子圖並不一定是有內聚力的群組，但它們可以說明哪些區域包含類似於clique的結構。</p>
<p>K-cores can be used as a way to find cohesive subgroups in graphs. K 核可以用來尋找圖中的內聚子群。</p>
<p><img src="G:%5C%E6%88%91%E7%9A%84%E9%9B%B2%E7%AB%AF%E7%A1%AC%E7%A2%9F%5CSNA%5CClass3%5Cimages%5CBBB06.png" alt="" style="width:25cm;height:5cm;" /></p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-marpit-scope-zBUiWO5z="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="9" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h4 id="clique"><strong>Clique</strong></h4>

<p>A complete subgraph where <code>every pair of nodes is connected</code> (local dense structure).一個完全子圖，其中任意兩個節點之間都有邊相連（局部密集結構）。</p>
<p>Cliques represent the <code>strongest possible local cohesion</code>. A <strong>maximal clique</strong> cannot be extended further. **團(簇/小圈子)**代表了<code>局部範圍內最強的凝聚性</code>。極大團（maximal clique）是指無法再通過加入其他節點而擴展的團。</p>
<p>A triangle is an example of a clique of <strong>size three</strong> since it has three nodes and all the nodes are connected.  A clique with size greater than or equal to that of every other clique in the graph is called a <strong>maximum clique</strong>. 三角形就是一個<strong>大小為三</strong>的團的例子，因為它有三個節點，而且<strong>所有節點都是相連的</strong></p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-scope-SzUPHKKx="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="10" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p>We often want to find <strong>all of the cliques</strong> in a network of various sizes. We could have a theory for example that people will dress or behave similarly or affect those in their cliques. 我們經常希望在不同規模的網路中找到所有的<strong>簇(團)</strong>。例如，我們可以有這樣一種理論，即人們的穿著打扮或行為舉止都會相似，或者會影響到他們小團體中的人。</p>
<p>we might imagine cliques to be meaningful for the outcomes we are interested in study.也就是說，我們可以想像小團體對我們感興趣的研究結果是有意義的.</p>
<p>For example, the same can be said of only two of the 11 cliques of size four. 在空手道網路中，兩個最大的簇（正式名稱為最大團）是最大的，而 11 個大小為 4 的小群中只有兩個是最大的。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-marpit-scope-sjRC9Gm2="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="11" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h3 id="motif-%E6%A8%A1%E9%AB%94">Motif 模體</h3>

<p>Small recurring subgraphs (e.g., triangles = 3-clique, feed-forward loops in directed networks) that <code>appear more frequently</code> than in random networks. 指 <code>小規模且反復出現的子圖結構</code>（例如三角形即為3階團，在有向網路中如前饋環等），其出現頻率顯著高於隨機網路中的預期。</p>
<p><code>Motifs</code> are building blocks of local connectivity and function (e.g., triangles indicate transitivity or clustering). <code>模體/ 子圖模式</code>是局部連接與功能的基本構建單元（例如，三角形表現了傳遞性或聚類特性）。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-marpit-scope-yR5xuty9="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="12" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h2 id="community-detection-%E7%A4%BE%E5%8D%80%E7%99%BC%E7%8F%BE">Community Detection 社區發現</h2>
<h4 id="finding-densely-connected-node-groups">Finding densely connected node groups</h4>

<p><strong>Community detection</strong> refers to the task of identifying groups of nodes in a network that are more densely connected internally than with the rest of the network. <strong>社區發現</strong>（Community Detection）是指在網路中識別出內部連接緊密、而與外部連接稀疏的節點群組。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-wCumYc3A="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="13" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p><strong>Community detection</strong> is the process of identifying groups (also called <em>modules</em>, <em>clusters</em>, or <em>communities</em>) of nodes in a network such that<strong>社區發現</strong>（Community detection）是指在網路中識別出若干節點群組（也稱為<em>模組</em>、<em>簇</em>或<em>社區</em>）的過程，其核心特徵是：:</p>
<ul>
<li>Nodes <strong>within</strong> a group are <strong>more densely connected</strong> to each other <strong>組內節點之間連接更密集</strong>,</li>
<li>Nodes <strong>between</strong> different groups are <strong>sparser connected</strong> <strong>不同組之間的節點連接更稀疏</strong>.</li>
</ul>
<p><img src="G:%5C%E6%88%91%E7%9A%84%E9%9B%B2%E7%AB%AF%E7%A1%AC%E7%A2%9F%5CSNA%5CClass3%5Cimages%5CCCC01.png" alt="" style="width:15cm;height:5cm;" /></p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-scope-3830pesh="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="14" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p>Community detection is not a single algorithm but a broad class of methods, including <code>modularity optimization (e.g., Louvain)</code>, statistical inference (e.g., Stochastic Block Models), information-theoretic approaches (e.g., Infomap), and clique-based techniques. 社區發現並非單一演算法，而是一類方法的統稱，包括：基於<code>模組度優化</code>的方法（如Louvain演算法）、統計推斷方法（如隨機塊模型）、資訊理論方法（如Infomap），以及基於團的演算法等。</p>
<p>Communities can be <strong>disjoint</strong> (each node belongs to one group) or <strong>overlapping</strong> (nodes belong to multiple groups), depending on the method and context. 根據方法和應用場景的不同，社區可以是<strong>互斥的</strong>（每個節點僅屬於一個社區），也可以是<strong>重疊的</strong>（節點可同時屬於多個社區）。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="15" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<p>Zachary Karate Club<br />
<img src="G:%5C%E6%88%91%E7%9A%84%E9%9B%B2%E7%AB%AF%E7%A1%AC%E7%A2%9F%5CSNA%5CClass3%5Cimages%5CDD02.png" alt="" style="width:25cm;height:10cm;" /></p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-dsLj4RZd="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="16" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h3 id="major-algorithmic-approaches"><strong>Major Algorithmic Approaches</strong></h3>

<p>Community detection methods is the  <strong>Modularity-Based Optimization</strong> 社區檢測方法之一是<strong>基於模組度優化</strong></p>
<ul>
<li><strong>Idea</strong>: Find the partition that maximizes modularity Q尋找使 <code>模組度 Q</code>最大化的網路劃分方式.</li>
<li>Algorithms:
<ul>
<li><strong>Louvain</strong>: Fast, greedy, multi-level optimization (widely used) 快速、貪心、多層級優化，被廣泛應用.</li>
<li><strong>Leiden</strong>: Improves Louvain by ensuring well-connected communities 在 Louvain 基礎上改進，確保所發現的社區內部連接良好、結構更合理.</li>
</ul>
</li>
<li><strong>Pros</strong>: Fast, scalable to millions of nodes計算高效，可擴展至百萬級節點的大規模網路 .</li>
<li><strong>Cons</strong>: Resolution limit; degeneracy; not statistically principled 存在<strong>解析度限制</strong>（無法檢測過小的社區）、<strong>解的退化性</strong>（大量不同劃分可能具有相近的 Q 值），且缺乏嚴格的統計推斷基礎.</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-q1B42Deu="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="17" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h3 id="modularity-%E6%A8%A1%E7%B5%84%E5%BA%A6-q">Modularity 模組度 Q</h3>

<p><strong>Modularity</strong> (denoted <em>Q</em>) is a quantitative measure that evaluates the quality of a network partition into communities.Modularity，通常記為 <em>Q</em>）是一種用於評估網路社區劃分品質的量化指標。</p>
<p>It measures how much the <strong>actual density of edges within communities</strong> exceeds the <strong>expected density</strong> in a suitable <strong>randomized null model</strong>. <strong>模組度</strong>. 它通過比較社區內部 實際存在的 <code>邊數</code> 與在某一隨機模型（通常是保持節點度數不變的配置模型）下期望的 <code>邊數</code> 之差來衡量社區結構的顯著性。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-qTOZ8utI="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="18" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<ul>
<li><strong>High modularity</strong> (Q → 1): Strong community structure (dense within, sparse between).</li>
<li><strong>Low modularity</strong> (Q ≈ 0 or negative): No meaningful community structure—partition is no better than random.</li>
</ul>
<p>High modularity (<em>Q</em> close to 1) suggests strong community structure. However, modularity has known limitations: 模組度越高（接近1），說明社區結構越明顯。但模組度也存在局限性：</p>
<ul>
<li><strong>Resolution limit解析度限制</strong>: It may fail to detect small communities in large networks. 在大型網路中可能無法識別較小的社區；</li>
<li><strong>Degeneracy解的簡並性</strong>: Many vastly different partitions can yield similar <em>Q</em> values. ：大量結構迥異的劃分可能具有相近的 <em>Q</em> 值。</li>
</ul>
<p>Despite these issues, modularity remains widely used due to its simplicity and intuitive interpretation. 儘管如此，因其簡潔直觀，模組度仍是社區發現中最常用的指標之一。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-marpit-scope-s7bheyy6="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="19" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h5 id="how-to-make-the-graph-data-with-community-%E8%87%AA%E5%B7%B1-or-sbm">How to make the graph data with community: 自己 or SBM</h5>
<h6 id="case-i-describe-what-kind-of-community">Case I: describe what kind of community</h6>
<h4 id="case-ii--stochastic-block-model-%E9%9A%A8%E6%A9%9F%E5%8D%80%E5%A1%8A%E6%A8%A1%E5%9E%8B">Case II : Stochastic Block Model 隨機區塊模型</h4>

<p>The <strong>Stochastic Block Model</strong>(SBM) is a generative probabilistic model for networks with <code>community structure</code>. <strong>隨機塊模型</strong>（Stochastic Block Model, SBM）是一種用於 <code>生成</code>具有<code>社區結構網路</code> 的概率模型。</p>
<p>It assumes that nodes are assigned to latent groups (blocks), and the probability of an edge between any two nodes depends only on their group memberships. 它假設每個節點屬於某個潛在的“塊”（即社區），任意兩節點之間是否存在邊僅由它們所屬的塊決定。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-marpit-scope-uY1ktmtV="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="20" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<h4 id="define-parameters"><strong>Define Parameters</strong></h4>

<ul>
<li><strong>Number of nodes</strong> 節點數量 N; <strong>Number of communities (blocks)</strong> 社區（塊）數量 K</li>
<li><strong>Define Block Probability Matrix B 塊概率矩陣</strong>:Choose probabilities that reflect <strong>assortative</strong> (dense within-community, sparse between), <strong>disassortative</strong>, or other structures. 選擇能夠反映同配性（社區內部連接稠密、社區間連接稀疏）、異配性或其他結構的概率值
<ul>
<li><code>prob_matrix</code>: A square matrix (list of lists or NumPy array) where <code>prob_matrix[i][j]</code> is the probability of an edge between a node in block <code>i</code> and a node in block <code>j</code>. 一個矩陣（清單的清單或 NumPy 陣列）表示塊 i 中的節點與塊 j 中的節點之間存在連邊的概率
<ul>
<li>Diagonal entries (<code>i == j</code>) control <strong>within-community connectivity</strong>. 對角線元素 控制社區內部連通性</li>
<li>Off-diagonal entries control <strong>between-community connectivity</strong> 非對角線元素控制社區間連通性</li>
</ul>
</li>
</ul>
</li>
</ul>
<p>For example, in an assortative SBM, edges are more likely between nodes in the same block than across blocks. SBMs can also model disassortative or core–periphery patterns by adjusting the connection probability matrix. 例如，在<strong>同配性</strong>（assortative）中，同一區塊內的節點間連邊概率更高；通過調整塊間連接概率矩陣，SBM 也可建模<strong>異配性</strong>或核心—邊緣等結構。</p>

<h2 id="supplement--core%E2%80%93periphery-structure-%E6%A0%B8%E5%BF%83%E9%82%8A%E7%B7%A3%E7%B5%90%E6%A7%8B">Supplement : Core–Periphery Structure 核心—邊緣結構</h2>

<p><strong>Core–periphery structure</strong> is a type of mesoscale organization where a network consists of a <strong>dense core</strong> of highly interconnected nodes and a <strong>sparse periphery</strong> of nodes that connect mainly (or only) to the core but not to each other. <strong>核心—邊緣結構</strong>（Core–Periphery Structure）是一種中觀尺度的網路組織模式，其中網路由一個<strong>高度互聯的密集核心</strong>和一個<strong>稀疏的邊緣區域</strong>組成。邊緣節點主要（或僅）與核心節點相連，彼此之間很少或沒有連接。</p>
<ul>
<li>核心層： A <strong>dense, highly interconnected core</strong> of nodes acts as a central hub 由一組稠密且高度互聯的節點構成，充當中心樞紐,</li>
<li>邊緣層： A <strong>sparse periphery</strong> of nodes connects <strong>primarily (or exclusively) to the core</strong>, but <strong>rarely to each other</strong> 由一組稀疏的節點構成，它們主要（或僅）與核心層相連，而彼此之間極少連接。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="22" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="22" data-size="16:9">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">style</span> <span class="hljs-attr">scoped</span>&gt;</span><span class="language-css">
<span class="hljs-selector-tag">section</span> {
    <span class="hljs-attribute">font-size</span>: <span class="hljs-number">25px</span>;
}
</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
</code></pre>
<p><strong>Core–periphery models</strong>核心—邊緣模型 capture asymmetry and integration in networks—revealing who holds the center and who orbits around it 揭示了網路中的<strong>不對稱性與整合性</strong>，清晰地刻畫出誰佔據中心位置、誰處於週邊依附狀態.</p>
<p>Unlike community detection, which asks <em>“Who clusters together?”</em>, core–periphery analysis asks與社區發現所關注的“<strong>誰和誰聚集成群？</strong>”不同，核心—邊緣分析提出的問題是:</p>
<p><strong>“Who holds the network together</strong> 誰維繫著整個網路的連通？, and <strong>who depends on them?</strong>“誰又依賴於這些中心節點?</p>
<p>Whether through heuristic scores or probabilistic models, identifying this structure provides deep insight into <strong>power, flow, and resilience</strong> in complex systems 無論是通過啟發式指標（如中心性）還是概率生成模型（如連續型核心—邊緣模型），識別這種結構都能為理解複雜系統中的<strong>權力分佈、資訊或資源流動路徑，以及系統韌性</strong>提供深刻洞見.</p>
