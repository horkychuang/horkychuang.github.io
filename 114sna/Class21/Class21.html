d-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--class:lead;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="18" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">

<h2 id="core-concepts">Core Concepts</h2>

<table>
<thead>
<tr>
<th>Metric</th>
<th>What it captures</th>
<th>Real-world analogy</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Degree Centrality</strong></td>
<td>Number of direct connections</td>
<td>&quot;How many friends do you have?&quot;</td>
</tr>
<tr>
<td><strong>Betweenness Centrality</strong></td>
<td>How often a node lies on shortest paths between others</td>
<td>&quot;Are you a bridge between groups?&quot;</td>
</tr>
<tr>
<td><strong>Closeness Centrality</strong></td>
<td>How close a node is to all others (inverse of avg. path length)</td>
<td>&quot;How fast can you spread news?&quot;</td>
</tr>
<tr>
<td><strong>Eigenvector Centrality</strong></td>
<td>Connected to important nodes</td>
<td>“Friends with the powerful”</td>
</tr>
<tr>
<td><strong>PageRank</strong></td>
<td>Eigenvector centrality with teleportation</td>
<td>Important + hard to reach by random walk</td>
</tr>
<tr>
<td><strong>Katz Centrality</strong></td>
<td>Rewards proximity to many nodes (decaying with distance)</td>
<td>--</td>
</tr>
</tbody>
</table>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-scope-HZagYoeT="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="3" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h2 id="application-in-social-media-analysis">Application in Social Media Analysis</h2>

<p>In social media analysis, <code>influencers</code>— often referred to as <code>Key Opinion Leaders (KOLs)</code>—are individuals or entities that wield significant influence over others within a network. 在社交媒體分析中，“影響者”（常被稱為“關鍵意見領袖”，即KOL）是指在網路中對他人具有顯著影響力的個人或實體。</p>
<p>They shape opinions, drive trends, and facilitate information dissemination. 他們能夠塑造觀點、引領潮流，並促進資訊傳播。</p>
<p>Using graph theory, we model social media as a graph where users are nodes and interactions (e.g., follows, retweets, mentions) are edges. 利用圖論，我們可以將社交媒體建模為一張圖，其中用戶是節點，而互動行為（例如關注、轉發、提及）則構成邊。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-scope-7AqSumU9="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="4" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<p>Influencers are identified through <strong>centrality analysis</strong>, which quantifies a node's importance based on its position and connections. 影響者的識別 通常通過<strong>中心性分析</strong>（centrality analysis）實現，該方法根據節點在網路中的位置及其連接關係來量化其重要性。</p>
<p>This helps in applications like <code>targeted marketing</code>, <code>viral campaign planning</code>, <code>misinformation detection</code>, or understanding power dynamics in online communities. 這一技術可應用於精准行銷、病毒式傳播活動策劃、虛假資訊檢測，以及理解線上社群中的權力結構等場景。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-OuKKY9VJ="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h4 id="a-influencer--centrality-analysis%E9%97%9C%E9%8D%B5%E7%AF%80%E9%BB%9E%E8%AD%98%E5%88%A5">A. <strong>Influencer / Centrality Analysis</strong>(關鍵節點識別)</h4>

<ul>
<li><strong>Concept</strong>：度中心性（Degree Centrality）、接近中心性（Closeness）、介數中心性（Betweenness）、特徵向量中心性（Eigenvector Centrality）</li>
<li><strong>Application</strong>：找出最具影響力的用戶（如 tread、FB KOL），用於行銷或輿情引導。</li>
<li><strong>Example</strong>：在轉發網路中，介數高的使用者可能是資訊傳播的“橋樑”。</li>
</ul>
<h4 id="centrality-measures-reveal-different-aspects-of-influence">Centrality measures reveal different aspects of influence:</h4>
<ul>
<li>
<p><strong>Local influencers</strong>: High <code>direct</code> connections (e.g., celebrities with many followers) 擁有大量<strong>直接連接</strong>（例如擁有眾多粉絲的名人）.</p>
</li>
<li>
<p><strong>Global influencers</strong>: <code>Bridge</code> disparate groups or control information flow (e.g., journalists connecting communities) 充當不同群體之間的<strong>橋樑</strong>，或掌控資訊流動（例如連接多個社群的記者）.</p>
</li>
<li>
<p><strong>Prestige influencers</strong>聲望影響者: Associated with other high-status nodes (e.g., endorsed by peers) 與其它高地位節點密切相關 (例如獲得同行認可或背書的人).</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-4PnNlKh9="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="6" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h3 id="power-of-katz">Power of Katz</h3>
<p><strong>Katz</strong> Centrality measures a node’s influence by counting the number of walks (of all lengths) emanating from it, with longer walks attenuated by a factor α &lt; 1 通過計算從某節點出發的所有長度路徑（walks）數量來衡量其影響力，其中較長路徑的貢獻會按衰減因數 α（α &lt; 1）進行折扣.</p>
<ul>
<li>
<p><strong>Katz</strong> Centrality is like a “smarter” version of degree centrality that rewards nodes connected to other influential nodes 它可視為度中心性（degree centrality）的一種“更智慧”版本，不僅考慮 <code>直接連接數量</code>，還獎勵那些與<strong>其他有影響力節點相連</strong>的節點.</p>
</li>
<li>
<p>Perfect for <strong>undirected or weakly connected graphs</strong> (common in mutual-follow networks) 特別適用于<strong>無向圖或弱連通圖</strong>（這在互相關注的社交網路中很常見）.</p>
</li>
</ul>
<p>In practice: <strong>High Katz = influential + connected to influential people</strong> → ideal for finding real KOLs 在實際應用中：<strong>Katz 中心性高 = 自身有影響力 + 且與有影響力的人相連</strong> → 非常適合用於識別真正意義上的關鍵意見領袖（KOL）.</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-marpit-scope-iXLAnJpJ="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="7" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h3 id="b-bridge-cross-ideology-detection">B. Bridge (Cross-Ideology) Detection</h3>

<p>In social media network analysis, particularly in studies of political polarization, a <strong>&quot;bridge&quot;</strong> or <strong>&quot;cross-ideology bridge&quot;</strong> refers to a user (node) who connects otherwise separated ideological communities (e.g., liberal vs. conservative users on Twitter/X). 在社交媒體網路分析中，尤其是在政治極化研究中，“<strong>橋樑</strong>”（bridge）或“<strong>跨意識形態橋樑</strong>”（cross-ideology bridge）指的是那些連接原本彼此隔離的意識形態群體（例如 Twitter/X 上自由派與保守派用戶）的用戶（節點）。</p>
<p>These bridges are rare but important because they are the few accounts through which information, memes, or influence can flow between opposing sides.  這類橋樑十分稀少，卻至關重要——因為它們是資訊、迷因（meme）或影響力得以在對立陣營之間流動的少數通道。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-marpit-scope-Zf9OSE41="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="8" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<p>Nodes with <strong>high betweenness centrality</strong> lie on many shortest paths between other nodes. 具有<strong>高介數中心性</strong>（high betweenness centrality）的節點，位於大量其他節點對之間的最短路徑上。</p>
<p>In a polarized network, the graph naturally splits into two (or more) densely connected ideological clusters with very few connections between them. 在一個高度極化的網路中，圖結構自然分裂為兩個（或多個）內部連接緊密的意識形態簇群，而簇群之間的連接極少。</p>
<p>The <code>few existing connections</code> between clusters make certain nodes lie on almost all shortest paths that cross from one side to the other → those nodes get extremely high betweenness scores. 正是這些<strong>為數不多的跨簇連接</strong>，使得某些節點幾乎出現在所有從一側到另一側的最短路徑上，從而獲得極高的仲介中心性得分。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-marpit-scope-H0YDYtpH="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="9" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h2 id="c-churn-prevention">C. Churn Prevention</h2>

<p><strong>Churn prevention</strong> is a critical use case where graph theory shines — especially by identifying isolated or disengaged customers (孤立狀態或參與度下降的客戶) who are at high risk of leaving. <strong>客戶流失預防</strong>是圖論大顯身手的關鍵應用場景之一——尤其體現在識別那些處於<strong>孤立狀態</strong>或<strong>參與度下降</strong>的客戶，他們往往具有較高的流失風險。</p>
<p>In a social or interaction-based product, <strong>low connectivity</strong> often signals <strong>disengagement</strong>, <strong>lack of network effects</strong>, or <strong>missing value</strong>—all strong churn predictors. 在依賴社交互動或使用者間連接的產品中, <strong>低連接度</strong>（low connectivity）通常預示著: 用戶參與度降低; 未能從網路效應中獲益; 未感知到產品核心價值.</p>
<p>These factors are strong signals for predicting customer churn. By modeling users as nodes and interaction behaviors (such as messaging, collaboration, invitations, likes, etc.) as edges in a graph, enterprises can leverage graph analysis techniques (e.g., degree centrality, connected components, community detection) to proactively identify high-risk users and intervene promptly, thereby effectively reducing churn rates. 這些因素都是預測客戶流失的強有力信號。通過將用戶建模為圖中的節點、互動行為（如消息、協作、邀請、點贊等）建模為邊，企業可利用圖分析技術（如度中心性、連通分量、社區檢測等）主動識別高風險用戶，並及時干預，從而有效降低流失率。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-scope-BC1vadz9="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="10" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<p>We can compute metrics like <strong>degree</strong>, <strong>ego network size</strong>, and <strong>clustering coefficient</strong> to flag &quot;at-risk&quot; (churn-prone) customers. These metrics capture engagement levels and social &quot;stickiness&quot;: 我們可以計算度（degree）、<strong>自我網路規模（ego network size）和聚類係數（clustering coefficient</strong> 等指標，以識別<code>有風險（易流失）</code>的客戶。這些指標能夠反映用戶的參與度以及社交層面的“粘性”。</p>
<ul>
<li>
<p><strong>Degree = 0</strong>: Isolated nodes with no connections indicate completely disengaged customers, highly likely to churn due to lack of activity or ties. <strong>節點度</strong>（Degree）：客戶直接連接的其他節點數量（如好友、互動物件、購買品類等）。低度  可能意味著參與度低或社交孤立。</p>
</li>
<li>
<p><strong>Ego network size = 1 or 2</strong>: The ego network is the subgraph consisting of a node (the &quot;ego&quot;) and its direct neighbors. Size 1 means isolated (degree 0); size 2 means only one connection (degree 1). These small egos suggest minimal integration into the network, making churn easier without social repercussions (based on homophily—similar users tend to behave alike). <strong>自我中心網路規模</strong>（Ego-network Size）：以客戶為中心、在特定跳數內（通常為1跳）可達的所有節點數量.</p>
</li>
<li>
<p>自我中心网络 = 用户自身 + 其直接邻居。規模過小可能反映整體網路嵌入度不足。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-marpit-scope-UHlV5xPY="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="11" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<ul>
<li><strong>Low clustering coefficient</strong>: This measures how densely a node's neighbors are connected to each other (fraction of possible triangles that exist). Low values (e.g., &lt; 0.2) indicate sparse local communities, implying weak relational bonds and higher churn propensity, as the customer isn't embedded in a tight-knit group. <strong>聚類係數</strong>（Clustering Coefficient）：衡量客戶鄰居之間彼此連接的緊密程度。低聚類係數可能表明其社交圈鬆散或缺乏社群歸屬。
<ul>
<li><strong>高聚類係數</strong>：Indicates that the user's local network is tightly knit (e.g., team members frequently collaborate), suggesting they are deeply embedded within an active subgroup and have a lower risk of churn. 使用者所處的局部網路緊密（例如，所在團隊成員之間頻繁協作），說明其深度嵌入某個活躍子群，流失風險較低。</li>
<li><strong>低/零聚類係數</strong>：Even if a user has multiple connections, if these connections are unrelated to each other (e.g., randomly using multiple isolated features), it may reflect superficial engagement, indicating a lingering risk of churn即使用戶有多個連接，但這些連接彼此不關聯（如隨機使用多個孤立功能），可能反映淺層參與，仍存在流失隱患。</li>
</ul>
</li>
</ul>
<p>Together, these metrics characterize the customer's embeddedness within the overall network—lower embeddedness suggests a more isolated state and a higher risk of churn. 這些指標共同刻畫了客戶在整體網路中的<code>嵌入性（embeddedness）</code>——嵌入性越低，越可能處於孤立狀態，流失風險越高。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-marpit-scope-MaqR6NNG="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="12" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h2 id="application-in-marketing">Application in Marketing</h2>
<h3 id="d-influencer-marketing">D. Influencer Marketing</h3>

<p><code>Influencer marketing</code> leverages social networks to promote products/ideas through key individuals who can amplify messages. 網紅行銷（Influencer marketing）借助社交網路，通過 關鍵個體 來推廣產品或理念，這些個體能夠放大傳播資訊.</p>
<p>Graph theory models this as nodes (users) and edges (interactions/referrals), identifying influencers via metrics like <code>high-degree (broad reach)</code>, <code>high betweenness (information brokers)</code>, and <code>echo chambers (amplified niches)</code>. 圖論將這一過程建模為節點（用戶）和邊（互動/推薦），並通過多種指標識別關鍵影響者：<strong>高連接度</strong>（high-degree，代表廣泛觸達）、<strong>高介數中心性</strong>（high betweenness，作為資訊仲介連接不同群體），以及<strong>回音室效應</strong>（echo chambers，指資訊在封閉小圈子內被不斷強化的傳播現象）。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-dnGvcPYu="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="13" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<p><strong>High-degree ≠ high influence.</strong> A user with 10K followers in one echo chamber spreads your message only <em>within</em> that bubble. 一個在單一回音室（echo chamber）中擁有 1 萬粉絲的用戶，只能將你的資訊<strong>局限在該圈子內部傳播</strong></p>
<p>A user with <strong>high betweenness</strong> connects <strong>multiple communities</strong> — they <strong>diffuse</strong> your message. <strong>高連接度</strong> <strong>≠</strong> <strong>高影響力</strong>。 ；而一個<strong>介數中心性</strong>（betweenness）高的用戶，則連接著<strong>多個不同社群</strong>，能夠真正<strong>擴散</strong>（diffuse）你的資訊，實現跨圈層傳播。</p>
<ul>
<li><strong>Echo Chamber</strong>（回音室 ）：Densely connected subgraph with high internal clustering but low external ties → opinions &quot;echo&quot; inside. 指用戶僅與觀點相似的人互動，資訊在封閉群體內反復迴圈，缺乏外部滲透。
<ul>
<li><strong>High-degree</strong>（高連接度）：Has many followers and frequent interactions, but if these connections are confined within a single community, the reach of information remains limited. 粉絲多、互動多，但若都在同一社群內，傳播廣度有限。</li>
<li><strong>High Betweenness</strong>（高介數中心性）：Acts as a &quot;bridge&quot; node between multiple communities. Even with fewer followers, such users can effectively relay information from one group to another, thereby <strong>unlocking network-wide diffusion</strong>. 位於多個社群之間的“橋樑”節點，即使粉絲不多，也能將資訊從一個群體傳遞到另一個群體，<strong>撬動全域傳播</strong>。</li>
</ul>
</li>
</ul>
<p><strong>策略調整</strong>：In seeding campaigns or word-of-mouth marketing, prioritize users who <strong>connect different communities</strong>. True influence isn’t about how many people you know—it’s about how many <strong>mutually disconnected worlds</strong> you link together. 在種子用戶投放或口碑行銷中，優先選擇<strong>連接不同社區的用戶</strong>. 真正的影響力，不在於你認識多少人，而在於你連接了多少個<strong>彼此不認識的世界</strong>。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-scope-pEmJriF3="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="14" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h2 id="application-in-finance">Application in Finance</h2>
<h4 id="e-portfolio-risk-using-graph-theory"><strong>E. Portfolio Risk Using Graph Theory</strong></h4>

<p>Financial assets (stocks, bonds, derivatives) exhibit <code>interdependencies</code> driven by market dynamics, sectors, or macroeconomic factors. Graph theory helps model and analyze these dependencies.  金融資產（股票、債券、衍生品）表現出由市場動態、行業板塊或宏觀經濟因素驅動的相互依賴性。圖論有助於對這些依賴關係進行建模和分析。</p>
<h6 id="minimum-spanning-trees-msts">Minimum Spanning Trees (MSTs)</h6>
<p>It is a powerful tool in finance for extracting a <strong>robust and interpretable skeletal structure</strong> from complex correlation networks, helping to uncover intrinsic market linkages, identify key nodes, and support informed decision-making. <strong>最小生成樹</strong>在金融中是一種強大的工具，用於從複雜的相關性網路中提取<strong>穩健、可解釋的骨架結構</strong>，説明理解市場內在聯繫、識別關鍵節點，並支持決策制定。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-nF2miqLG="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="15" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<p>MSTs achieve this by revealing the <strong>core dependency structure and interrelationships</strong> among a large set of financial assets—such as stocks, indices, or currencies—in the most concise and non-redundant way possible.<strong>最小生成樹</strong>（Minimum Spanning Trees, MSTs），是因為它能以最簡潔、無冗餘的方式揭示大量金融資產（如股票、指數或貨幣）之間的<strong>核心依賴結構和關聯關係</strong>。</p>
<ul>
<li><strong>Noise Reduction and Network Simplification</strong>：Financial market data often contain substantial noise and redundant correlations. The MST constructs an acyclic, connected subgraph by retaining only the minimal set of edges needed to connect all nodes (e.g., stocks), with the total edge weight minimized (typically based on distance metrics derived from negative correlations or dissimilarity measures). This filters out weaker or spurious relationships and highlights the most significant co-movements.金融市場資料通常包含大量雜訊和冗餘相關性。MST 通過保留連接所有節點（如股票）所需的最少邊（且總權重最小，通常基於負相關性或距離度量），構建一個無環、連通的子圖，從而過濾掉次要關聯，突出最重要的聯動關係。</li>
</ul>

<h4 id="from-raw-financial-data-to-mst">From Raw Financial Data to MST</h4>

<p>Returns --&gt; correlation matrix --&gt; distance --&gt; weight graph --&gt; MST algorithm</p>
<ol>
<li>
<p><strong>Compute Returns</strong>: Convert prices to <strong>log returns</strong> (or simple returns). Returns are stationary and better reflect risk/dependence than raw prices. 將價格轉換為對數收益率（或簡單收益率）。收益率具有平穩性，比原始價格更能準確反映風險和依賴關係。</p>
</li>
<li>
<p>Compute the <strong>Pearson correlation coefficient</strong> between every pair of assets. 計算每對資產之間的皮爾遜相關係數 (Pearson correlation coefficient).</p>
</li>

<h4 id="systemic-risk-identification-%E7%B3%BB%E7%B5%B1%E6%80%A7%E9%A2%A8%E9%9A%AA%E8%AD%98%E5%88%A5"><strong>Systemic Risk Identification</strong> <strong>系統性風險識別</strong>:</h4>

<ul>
<li>
<p>Highly connected or central assets (high <strong>degree</strong> or <strong>eigenvector centrality</strong>) can act as <code>risk conduits</code>. <strong>高度連接或處於核心地位的資產</strong>（具有較高的<strong>度中心性</strong>或<strong>特徵向量中心性</strong>）可能成為風險傳導的管道</p>
</li>
<li>
<p><strong>Clustering</strong> identifies sectors or asset classes that move together, exposing concentration risk. <strong>聚類分析</strong>可識別出價格走勢高度一致的行業或資產類別，從而揭示<strong>集中度風險</strong>（即風險過度集中於某一類資產或部門）。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-FDrRh0Rs="" data-color="#000" data-background-color="#fef9e7" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="18" style="--color:#000;--background-color:#fef9e7;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="18" data-size="16:9">
<h4 id="high-betweenness-centrality"><strong>High Betweenness Centrality</strong></h4>

<ul>
<li>Means the asset lies on a <strong>large number of shortest paths</strong> (which, in an MST, are the <em>only</em> paths between node pairs). 表示該資產位於<strong>大量最短路徑</strong>（在 MST 中是唯一路徑）。</li>
<li>Even if it has few direct neighbors, information or risk transmission between many asset pairs must pass through it.即使它連接的鄰居不多，但很多資產之間的資訊/風險傳導必須經過它。</li>
<li>Such nodes act as <strong>“bridges” or “bottlenecks” in risk propagation</strong>—if they fail or become disrupted, they can block, reroute, or amplify systemic risk flows, potentially triggering widespread cascading effects這類節點是風險傳導的“橋樑”或“瓶頸”**—— 一旦失效，可能阻斷或扭曲整個系統的風險傳播路徑，甚至引發更大範圍的連鎖反應。</li>
</ul>
