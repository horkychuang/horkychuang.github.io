d" data-theme="gaia" lang="zh-TW" class="lead" data-marpit-pagination="1" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--class:lead;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="50" data-size="16:9" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="big-data-and-society">Big Data and Society</h1>
<p><strong>Class041 Afﬁliation Networks</strong></p>
<p><strong>國企 Wen-Bin Chuang</strong><br />
<strong>2026-02-14</strong></p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-class="lead" data-theme="gaia" lang="zh-TW" class="lead" data-marpit-pagination="1" style="color:#000;" data-marpit-pagination-total="50" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-marpit-scope-6ztljCrg="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="2" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p><strong>Affiliation networks</strong> (also called <strong>two-mode networks</strong> or <strong>bipartite networks</strong>) are a type of social network where <strong>two distinct types of nodes</strong> are connected—such as <em>people</em> and <em>organizations</em>, <em>users</em> and <em>hashtags</em>, <em>investors</em> and <em>companies</em>, or <em>consumers</em> and <em>products</em>. <strong>隸屬網路</strong>（也稱為<strong>二模網路</strong>或<strong>二分網路</strong>）是一種社交網路，其中連接的是<strong>兩類不同的節點</strong>——例如<em>人</em>與<em>組織</em>、<em>使用者</em>與<em>話題標籤</em>（hashtags）、<em>投資者</em>與<em>公司</em>，或<em>消費者</em>與<em>產品</em>。</p>
<p>Unlike traditional (one-mode) networks that link similar entities (e.g., person-to-person), affiliation networks capture <strong>membership</strong>, <strong>participation</strong>, or <strong>co-occurrence <strong>relationships. 與傳統的（單模）網路（如人與人之間的連接）不同，隸屬網路刻畫的是</strong>成員關係</strong>、<strong>參與關係</strong>或<strong>共現關係</strong>。</p>
<h4 id="structure-of-an-affiliation-network">Structure of an Affiliation Network</h4>
<ul>
<li><strong>Mode A</strong>: Actors (e.g., users, investors, customers) 行動者（例如用戶、投資者、顧客）</li>
<li><strong>Mode B</strong>: Affiliations (e.g., groups, brands, stocks, events) 隸屬物件（例如群體、品牌、股票、活動）</li>
<li><strong>Edges</strong>: Exist only between Mode A and Mode B (never within the same mode) 僅存在於模A與模B之間（同一模內部不存在連接）</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-scope-euK96fOv="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="3" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h2 id="application-in-marketing">Application in Marketing</h2>

<p>Building on <strong>bipartite (affiliation) networks</strong>, we can construct powerful tools for retail, e-commerce, and marketing—especially in <strong>cross-selling</strong> and <strong>product recommendation</strong>. 基於二分（附屬）網路，我們可以構建強大的工具應用於零售、電子商務和行銷領域——特別是在<code>交叉銷售</code>和<code>產品推薦</code>方面。</p>
<h5 id="from-bipartite-network-to-product-affinity-network-%E5%BE%9E%E4%BA%8C%E5%88%86%E7%B6%B2%E7%B5%A1---%E7%94%A2%E5%93%81%E8%A6%AA%E5%92%8C%E7%B6%B2%E7%B5%A1">From Bipartite Network to Product Affinity Network 從二分網絡--&gt; 產品親和網絡</h5>
<p>Start with a <strong>Bipartite Customer–Product Network</strong></p>
<ul>
<li><strong>Mode A</strong>: Customers (e.g., C₁, C₂, ..., Cₙ) <strong>顧客</strong>（消費者、企業客戶、APP使用者）是一類節點and <strong>Mode B</strong>: Products (e.g., P₁, P₂, ..., Pₘ) <strong>產品</strong>（如手機、咖啡、保險套餐、短視頻內容）是另一類節點</li>
<li><strong>Edge</strong>: Exists if a customer purchased (or viewed/rated) a product. 當顧客購買、流覽、收藏或互動某產品時，即建立連接。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-scope-fEWYLsbq="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="4" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>Once you have established an edge between Product A and Product B, what does that relationship actually mean business-wise?
<ul>
<li>Complements (The Most Common Case)： Bundle them, place them near each other, or recommend B<em>B</em> when A<em>A</em> is in the cart</li>
</ul>
</li>
</ul>
<p>Example: C₁ → P₁, P₃; C₂ → P₁, P₂, P₃; C₃ → P₂</p>
<ul>
<li>例如：
<ul>
<li>User A purchased a coffee machine and coffee beans → creating links: A — Coffee Machine, A — Coffee Beans用戶A 購買了 咖啡機 和 咖啡豆 → A — 咖啡機，A — 咖啡豆</li>
<li>User B browsed an electric toothbrush and a water flosser → implying a demand association within the oral care category. 用戶B 流覽了 電動牙刷 和 沖牙器 → 暗示口腔護理品類存在需求關聯。</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-Lf49TUxx="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p><code>Project</code> to a <strong>Product Co-Purchase Graph</strong> (One-Mode Projection). We now create a <strong>Product Affinity Network</strong> — a weighted graph <strong>加權的產品親和網路</strong>（Product Affinity Network）將原始的<strong>顧客–產品二分網路</strong>投影為<strong>產品–產品網路</strong> where:</p>
<ul>
<li>
<p><strong>Nodes</strong>: Products only. 節點：所有產品; <strong>Edges</strong>: Exist between two products if <strong>at least one customer bought both</strong>. 若至少一位顧客同時接觸（購買/流覽）兩個產品，則連邊</p>
</li>
<li>
<p><strong>Edge weight</strong>: Number of customers who co-purchased the pair. <code>邊權重</code>：共現頻次 或 相似度得分</p>
</li>
</ul>
<p>From above: P₁–P₃: 2 customers (C₁, C₂); P₁–P₂: 1 customer (C₂); P₂–P₃: 1 customer (C₂). This graph reveals <strong>product affinities</strong>—natural groupings based on real behavior. 這就是電商平臺“經常一起買”、“看了又看”功能的演算法基礎</p>
<ul>
<li>Product co-purchase : 成對購買</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-NgSY9dbc="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="6" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h5 id="applications-cross-selling-%E4%BA%A4%E5%8F%89%E9%94%80%E5%94%AEcross-selling-recommendations">Applications: Cross-Selling 交叉销售（Cross-Selling）&amp; Recommendations</h5>
<p>The <strong>Product Affinity Network directly</strong> enables: 產品親和力網絡可以</p>
<ul>
<li><strong>&quot;Frequently bought together&quot;</strong> suggestions (Amazon-style). 成對購買的頻率</li>
<li><strong>Cross-selling</strong>: Recommend Product B when a user views/buys Product A. <strong>交叉销售</strong>：基於 product親和網路，在使用者購買A時推薦 <code>高親和度</code>的B（如買手機推薦耳機）；</li>
<li><strong>Category discovery</strong>: Identify <code>substitute</code> or <code>complementary</code> products.</li>
</ul>
<h5 id="%E5%90%91%E4%B8%8A%E9%94%80%E5%94%AEup-selling"><strong>向上销售（Up-Selling）</strong></h5>
<ul>
<li><strong>向上销售</strong>：Identify &quot;upgrade paths&quot;—for example, users who purchase an entry-level camera often buy professional lenses within three months, allowing for proactive promotional triggers. 識別“升級路徑”——例如，購買入門款相機的用戶，常在3個月內購買專業鏡頭，可提前觸發促銷。</li>
</ul>
<p>But simple co-purchase counts can be misleading (e.g., popular items co-occur by chance). That’s where <strong>similarity metrics</strong> help. 簡單只看共同購買是不夠的, 必須要從<code>相似性</code>著手</p>

<p>Example: How similar are Coffee (A) and Sugar (B)？<br />
Buyers of Coffee (A) = {Alice, Bob, Carol} and Buyers of Sugar (B)  = {Alice, Bob, Dave}</p>
<p>--&gt; Intersection A ∩ B = {Alice, Bob}  → 2 customers bought BOTH, Union A ∪ B = {Alice, Bob, Carol, Dave}<br />
→ 4 customers bought EITHER, finally, Jaccard(A,B) = |A ∩ B| / |A ∪ B| = 2 / 4 = 0.5  (or 50%)</p>

<p><strong>Jaccard Similarity</strong> filters out the 'noise' generated by bestsellers, focusing instead on combinations with a genuinely high co-occurrence <strong>ratio</strong>. Jaccard相似度：排除熱門商品的“噪音”，聚焦真正共現比例高的組合. A high Jaccard value indicates a specific, <code>high-frequency co-purchase pattern</code>, revealing true product affinity rather than general popularityJaccard值高，說明存在 <code>特定商品們的高頻共現</code></p>

</li>
<li>
<p>Rewards connections through <strong>niche or focused buyers</strong> (more meaningful signal).<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Effective at filtering noise from &quot;heavy buyers&quot; who purchase everything. 優先採納“<code>重度</code>興趣使用者”的行為信號，提升推薦精准度</p>
</li>
</ul>
<p><code>Adamic-Adar指数</code>: A greater weight on the co-purchase behavior of <strong>&quot;low-activity but highly focused&quot;</strong> customers. 更重視“低活躍但專注”的顧客的共現行為。</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-marpit-scope-d9W53V6q="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="11" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>If two products are bought together by a customer who only buys 2 items, that’s more significant than if they’re bought by a customer who buys 100 items. 如果 <code>兩位產品</code> 是被一位僅購買了 兩件商品的顧客同時買下，其意義遠大於被一位購買了上百件商品的顧客同時買下。For example：</p>
<ul>
<li>A customer who only buys mountaineering gear purchases both a hardshell jacket and a trekking pole (only 2 items) → The Adamic-Adar index assigns a high weight. 一位只買登山裝備的顧客同時買了衝鋒衣和登山杖 only 2 items → Adamic-Adar 給予高權重重；</li>
<li>A &quot;shopaholic&quot; who buys across the entire site also purchases these two items → The weight is very low.一位買遍全站的“剁手黨”也買了這兩件 → 權重很低。 結果：系統更信任前者的行為，認為這是真實需求關聯。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-marpit-scope-VxVNrbTP="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="12" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h4 id="personalizing-affinity-by-user-segment-%E5%9F%BA%E6%96%BC%E7%94%A8%E6%88%B6%E7%B4%B0%E5%88%86%E7%9A%84%E5%81%8F%E5%A5%BD%E5%80%8B%E6%80%A7%E5%8C%96"><strong>Personalizing Affinity by User Segment 基於用戶細分的偏好個性化</strong></h4>

<p>Objective: Build separate <code>product affinity networks</code> for different customer segments (e.g., &quot;high-value&quot; vs. &quot;budget&quot;) and compare recommendations. 為不同客戶群體（例如“高價值客戶”與“預算敏感型客戶”）分別構建<strong>不同偏好的 產品親和網路</strong>，並比較各群體的推薦結果。</p>
<p>Method</p>
<ul>
<li>Segment users (e.g., by total purchases) 首先根據使用者特徵（如總消費金額、購買頻次等）將用戶劃分為不同細分群體(例如“高價值” vs. “預算型”),
<ul>
<li>
<p><code>Count</code> the number of transactions for each user in the dataset. <strong>根據使用者活躍度進行分群（例如，按購買次數）</strong></p>
</li>
<li>
<p>Then, filter for users with 2 or more purchases, classifying them as &quot;high-value&quot; or &quot;active&quot; users. : 然後，篩選出購買次數 <strong>大於等於</strong> <strong>2</strong> <strong>次</strong> 的用戶，將其視為“高價值用戶”或“活躍用戶”</p>
</li>
<li>
<p>Reconstruct the bipartite graph (User-Product) specifically for this high-value user segment. <strong>為這個高價值用戶群體重新構建二分圖（用戶-商品</strong> bipartite graph）</p>
</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-wjfbS5fP="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="13" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>
<p>For each segment, extract sub-bipartite graph 針對每個細分群體，中提取對應的<strong>子二分圖</strong>（sub-bipartite graph）</p>
<ul>
<li>compute Jaccard/AA 在每個子網路上，使用相似性指標（如<strong>Jaccard係數</strong>或<strong>Adamic-Adar指數</strong>）衡量產品之間的關聯強度（即通過共同被該群體用戶購買/互動的程度反映偏好共現）.</li>
</ul>
</li>
<li>
<p>Recommend top products per segment. 基於<code>相似性得分</code>，為每個細分群體推薦其最相關的<strong>Top-K產品</strong>。</p>
</li>
</ul>
<p>該方法能夠捕捉不同使用者群體在<code>產品組合</code>偏好上的結構性差異，從而實現更精准、更具相關性的個性化推薦。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-scope-87FeizdJ="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="14" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h4 id="substitutes-vs-complements-via-network-signals-%E7%B6%B2%E8%B7%AF%E4%BF%A1%E8%99%9F%E8%AD%98%E5%88%A5%E6%9B%BF%E4%BB%A3%E5%93%81%E8%88%87%E4%BA%92%E8%A3%9C%E5%93%81"><strong>Substitutes vs. Complements via Network Signals 網路信號識別替代品與互補品</strong></h4>

<p>Use <strong>purchase co-occurrence</strong> (complements) vs. <strong>browsing co-consideration</strong> (substitutes). 利用使用者行為資料中的網路結構信號，區分產品之間的<strong>互補關係</strong>（complements）: 傾向於被<strong>同時購買</strong>（如手機與耳機）與<strong>替代關係</strong>（substitutes）: 傾向於被<strong>共同流覽但很少一同購買</strong>（如不同品牌的同類商品）</p>
<ul>
<li>
<p><strong>Complements</strong>: 計算產品對之間的 <strong>Jaccard</strong> <strong>相似係數</strong>（反映共同購買用戶的占比）, High Jaccard on <strong>purchase</strong> data.</p>
<ul>
<li><strong>高</strong> <strong>Jaccard</strong> <strong>值</strong> → <code>強互補性</code>。但是 only 低Jaccard沒什麼功能</li>
</ul>
</li>
<li>
<p><strong>Substitutes</strong>: 計算產品對之間的 <strong>Adamic-Adar (AA)</strong> 指數（更重視稀有共同流覽者，對長尾行為敏感）.</p>
<ul>
<li>High Adamic-Adar on <strong>view/browse</strong> data (same users view both but rarely buy together). 若兩產品被相同使用者頻繁流覽，但極少被一同購買，則視為潛在替代品。<strong>高 AA + 低 Jaccard</strong> → <code>強替代性</code></li>
</ul>
</li>
</ul>
<p><strong>高</strong> <strong>Jaccard</strong> <strong>值</strong> → <code>強互補性</code>, 低 Jaccard 必須加上AA , <strong>高 AA + 低 Jaccard</strong> → 強替代性</p>
<p>「長尾」指<strong>大量低頻出現、小眾但總量可觀的物品或用戶行為</strong>，其分布符合冪律（Power Law）</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-GRmiVJN9="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="15" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>This approach integrates outcome behaviors (purchases) with intent behaviors (browsing), effectively decoupling two distinct types of relationships: functional synergy (complementarity) and choice competition (substitutability). 此方法結合了<strong>結果行為</strong>（購買）與<strong>意圖行為</strong>（流覽），能有效解耦功能協同（互補）與選擇競爭（替代）兩類關係</p>
<p>It is highly applicable to product recommendation, category management, and the optimization of marketing strategies. 適用於推薦、品類管理和行銷策略優化。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-CehDvfon="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="16" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="cold-start-for-new-products-%E6%96%B0%E7%94%A2%E5%93%81%E7%9A%84%E5%86%B7%E9%96%8B%E6%A9%9F%E5%95%8F%E9%A1%8C"><strong>Cold Start for New Products 新產品的冷開機問題</strong></h3>

<p>Estimate affinity for a new product <code>P5</code> using its <strong>attributes</strong> (e.g., category) and existing network. 利用新商品 <code>P5</code> 的<strong>屬性資訊</strong>（例如相同的商品品類）及其與現有商品的關聯，利用 <strong>已有產品偏好網路</strong>估算其商品親和力。</p>
<p>Method</p>
<ol>
<li>
<p><strong>屬性對齊</strong>: Assign <code>P5</code> to a category (e.g., same as <code>P1</code>, <code>P2</code>). 將新商品 <code>P5</code> 歸入一個已知類別（例如與現有商品 <code>P1</code>、<code>P2</code> 同屬“無線藍牙耳機”類）</p>
</li>
<li>
<p><strong>親和力遷移</strong>: Inherit affinities from similar products via <strong>average Jaccard</strong>. 基於同品類的已有商品（如 <code>P1</code>, <code>P2</code>），計算它們在使用者–產品二分圖中與 其他產品的 <strong>Jaccard</strong> <strong>相似度向量</strong>（即每款產品對所有其他產品的 Jaccard 得分）。</p>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-VJ7BREqj="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="17" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>然後，take the <strong>average</strong> of these similarity vectors to serve as the initial affinity representation for <code>P5</code>對這些相似度向量取<strong>平均值</strong>，作為 <code>P5</code> 的初始親和力表示。
<ul>
<li>For example：If the Jaccard values between <code>P1</code> and products <code>A</code>, <code>B</code>, <code>C</code> are <code>[0.3, 0.1, 0.6]</code>, and the corresponding values for <code>P2</code> are <code>[0.4, 0.2, 0.5]</code>, then the initial affinity vector for <code>P5</code> would be <code>[0.35, 0.15, 0.55]</code>若 <code>P1</code> 與 <code>A</code>、<code>B</code>、<code>C</code> 的 Jaccard 值為 <code>[0.3, 0.1, 0.6]</code>， <code>P2</code> 對應值為 <code>[0.4, 0.2, 0.5]</code>，<br />
則 <code>P5</code> 的初始親和力向量為 <code>[0.35, 0.15, 0.55]</code>。</li>
</ul>
</li>
</ul>
<ol start="3">
<li>Based on this affinity vector, you can immediately identify potentially high-interest users for <code>P5</code> (e.g., users who have previously purchased or browsed products with high Jaccard similarity to <code>P5</code>), or include <code>P5</code> in recommendation lists for exploratory exposure 基於親和力向量，可立即為 <code>P5</code> 識別潛在高興趣用戶（如曾購買/流覽高 Jaccard 產品的使用者），或將其納入推薦列表進行探索性曝光。</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-oO0pWBxp="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="18" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h4 id="product-centrality-%E2%86%92-business-impact-%E7%94%A2%E5%93%81%E4%B8%AD%E5%BF%83%E6%80%A7%E5%B0%8D%E6%A5%AD%E5%8B%99%E5%BD%B1%E9%9F%BF%E7%9A%84%E5%88%86%E6%9E%90"><strong>Product Centrality → Business Impact 產品中心性對業務影響的分析</strong></h4>

<p>Identify <code>hub</code> products (<code>high degree in affinity network</code>) and test if they drive basket size.識別親和網路中的<code>樞紐型產品</code>（具有<strong>高度中心性</strong>的產品），並檢驗其是否能帶動<strong>購物籃規模</strong>（basket size）的提升</p>
<ul>
<li>Build product co-purchase graph <strong>構建產品共購圖</strong>: Connect every pair of products that appear in the same order to form a <strong>single-mode product network</strong> (a one-mode projection of the user–product bipartite graph) 將同一訂單中出現的 產品兩兩連接，形成一個<strong>單模產品網路</strong>（one-mode projection of the user–product bipartite graph）.</li>
<li>then, compute <strong>degree centrality</strong> 對每個產品節點, 計算其<strong>度中心性</strong>（即與其他產品的連接數量）。A higher degree centrality indicates that a product is frequently purchased alongside other products, acting as a &quot;hub&quot; within the network度中心性越高，說明該產品越常與其他產品一同被購買，是網路中的“樞紐”。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-marpit-scope-5MpBferD="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="19" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>
<p>Finally, correlate with average basket size when product is purchased<strong>關聯業務指標：平均購物籃大小</strong>:</p>
<ul>
<li>For each product Pi, calculate the <strong>average basket size</strong> (i.e., the average number of items per order) across all orders containing Pi. 對每個產品 Pi，計算所有包含 Pi 的訂單的<strong>平均商品購買數量</strong>（即 basket size）。</li>
</ul>
</li>
</ul>
<p>High-centrality products (e.g., P1, P2) → larger baskets. <strong>高中心性產品</strong>（如 <code>P1</code>, <code>P2</code>）通常作為“入口”或“基礎品”，常被搭配其他商品購買，因此其所在訂單的<strong>平均購物籃更大</strong>。</p>
<ul>
<li>If validated, these products can be leveraged for 若驗證成立，這類產品可被用於：
<ul>
<li><code>Cross-selling Anchors</code>: Recommending high-centrality products to drive overall sales volume:推薦高中心性產品以拉動整體銷售額</li>
<li><code>Promotional Strategy Prioritization</code>: Prioritizing the promotion of high-centrality items, as they are likely to generate a larger halo effect or spillover in associated sales: 推廣 高中心性產品 可能帶來更大的連帶銷售效應</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-marpit-scope-VAATYyQ6="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="20" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>It is further beneficial to distinguish between weighted degree centrality (accounting for co-purchase frequency) and unweighted degree centrality to capture different types of hub effects. 可進一步區分<strong>加權度中心性</strong>（考慮共購頻率）與<strong>未加權度中心性</strong>，以捕捉不同類型的樞紐效應。</p>
<p>By controlling for factors such as category and price through regression analysis, one can more rigorously evaluate the marginal contribution of centrality to the overall basket size. 控制品類、價格等因素後做回歸分析，可更嚴謹地評估中心性對 basket size 的<strong>邊際貢獻</strong>。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-marpit-scope-1cxomdtt="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="21" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="ethical-risks-in-affinity-marketing-%E8%A6%AA%E5%92%8C%E8%A1%8C%E9%8A%B7%E4%B8%AD%E7%9A%84%E5%80%AB%E7%90%86%E9%A2%A8%E9%9A%AA%E9%98%B2%E6%8E%A7"><strong>Ethical Risks in Affinity Marketing 親和行銷中的倫理風險防控</strong></h3>

<p>Detect <code>risky product pairs</code> (e.g., diet pills 減肥藥+ laxatives 瀉藥，通便劑) that should <strong>not</strong> be recommended together. 具有潛在倫理或健康風險的產品組合（例如“減肥藥 + 瀉藥”），避免將此類高親和度產品對推薦給使用者，防止造成身體傷害、誤導消費或引發合規問題。</p>
<ol>
<li><code>Flag</code> sensitive categories (manual or keyword-based) 敏感品類標記：通過<strong>人工規則</strong>或<strong>關鍵字匹配</strong>（如“減肥”、“瀉藥”、“精神類”、“醫療器械”等）建立敏感產品類別清單。</li>
<li><strong>高親和商品對篩查</strong>: If both products in a high-affinity pair are sensitive → suppress recommendation. 在高度親和產品網路中，識別出 Jaccard 或 Adamic-Adar 相似度較高的 產品組合。檢查這些高親和度產品組合對是否<strong>雙方均屬於敏感類別</strong>。</li>
<li><strong>推薦壓制策略</strong>（Suppression Rule）: If <strong>both products</strong> in a high-affinity pair are <strong>flagged as sensitive</strong>, the recommendation for this combination must be <strong>blocked or suppressed</strong>, even if the data indicates a strong association.  若一個高親和度產品對中的<strong>兩個產品均被標記為敏感</strong>，則<strong>禁止或壓制</strong>該組合的推薦（即使資料上顯示強關聯）.</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-marpit-scope-91fA4KSf="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="22" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>Risk Combination Example: Diet Pills + Laxatives：減肥藥 + 瀉藥<br />
→ Although users may frequently purchase these together (resulting in a high Jaccard index), their combined use poses significant health risks 雖然用戶可能頻繁同時購買（高 Jaccard），但聯合使用存在健康隱患。<br />
→ Even if the model suggests &quot;users who like A also like B,&quot; this combination should be proactively <strong>not recommended</strong> 即使模型認為“喜歡A的人也喜歡B”，也應主動<strong>不推薦</strong>此組合。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-marpit-scope-ZcQz00bx="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="23" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h2 id="application-in-social-media-analysis">Application in Social Media Analysis</h2>

<p><strong>Bipartite Network</strong>: <em>Users <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> Hashtags / Groups / Events</em> <strong>使用者 <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> 話題/標籤/群組</strong></p>
<ul>
<li>
<p><strong>User用戶</strong> represent one type of node (people個人, accounts帳號, influencers意見領袖) 是一類節點；<strong>Affiliations</strong> (hashtags話題標籤, topics主題, groups群組, events事件, or even URLs/domainsURL/功能變數名稱) represent another；</p>
</li>
<li>
<p>A connection is formed whenever a user <code>posts, reposts, or engages</code> with a topic. 當某使用者 <code>發佈、轉發或參與某個</code>話題時，就形成一條連接。例如：</p>
<ul>
<li>
<ul>
<li>User A publishes a post with #CarbonNeutrality → Creates a link: A — #CarbonNeutrality 用戶A 發了帶 #碳中和 的帖子 → A — #碳中和</li>
<li>User B uses both #CarbonNeutrality and #GreenFinance simultaneously → This implies a semantic or behavioral association between these two tags. 用戶B 同時使用了 #碳中和 和 #綠色金融 → 暗示這兩個標籤存在語義或行動上的關聯。</li>
</ul>
</li>
</ul>
</li>
</ul>

</section>

<h4 id="metrics-in-action">Metrics in Action:</h4>

<ul>
<li><strong>Jaccard Similarity</strong> between hashtags: 標籤親和力（Hashtag Affinity）: Measure the strength of their association in public perception by calculating the frequency with which two tags are co-used by the same user通過計算 兩個標籤組被同一使用者共同使用的頻率，衡量它們在公眾認知中的關聯強度。<br />
How often do #ClimateAction and #GreenNewDeal appear in the <em>same posts</em> relative to their total usage? High Jaccard → tightly linked narratives. Jaccard相似度：排除熱門標籤的“噪音”，聚焦真正共現比例高的組合. 例如：#環保 與 #素食 在小眾群體中高頻共現，Jaccard值高，說明存在特定價值觀社群。</li>
<li><strong>Adamic-Adar</strong> for user influence: If two hashtags are co-used by users who <em>rarely post</em>, that signal is stronger (e.g., activists vs. bots). <strong>Adamic-Adar指数</strong>：更重視“低活躍但專注”的用戶（如環保活動家）的共現行為，而非大V的泛化發帖。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-marpit-scope-cBzUgSrt="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="26" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li><strong>Common Neighbors</strong> <strong>共同鄰居</strong>:<br />
Number of users who engage with both a brand and a social movement → reveals brand alignment risks/opportunities. 同時參與某個品牌和某項社會運動的用戶數量 → 揭示該品牌在價值觀契合方面的風險或機會</li>
</ul>
<p>Identify <code>bridge users</code> who connect polarized communities (e.g., pro/con vaccine groups) — critical for moderation or outreach. 識別連接立場對立社群的<code>橋樑用戶</code>（例如，支持與反對疫苗接種的群體）——這對內容審核或外聯策略至關重要。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-marpit-scope-eUVdWqQ1="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="27" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ol>
<li>
<p><code>Community Detection</code> and <code>Bridge Identification</code> 社區發現與橋接者識別: By <code>projecting</code> the bipartite network into a Tag-Tag Network or a User-User Network. 將二分網路 <code>投影</code>為 標籤-標籤網路 或 使用者-使用者網路 ，可識別：</p>
<ul>
<li>Discourse Clusters<strong>話語集群</strong>（ Climate Activists&quot; vs. &quot;Tech Optimists “氣候行動派” vs “技術樂觀派”）；Cross-Boundary Influencers <strong>跨界影響者</strong>：Users who engage in multiple seemingly unrelated topics (e.g., discussing both #ESG and #SupplyChain), acting as critical information bridges同時參與多個看似無關話題的使用者（如既談 #ESG 又談 #供應鏈），可能是關鍵資訊橋樑。</li>
</ul>
</li>
<li>
<p><code>Risk and Opportunity Insights</code> 風險與機會洞察</p>
<ul>
<li>Reputation Risk: If a brand unexpectedly co-occurs with sensitive tags (e.g., #BoycottXX), it may signal an impending reputation crisis 品牌若與某些敏感標籤（如 #抵制XX）出現意外共現，可能預示聲譽風險；</li>
<li>Emerging Narratives: New tag combinations (e.g., #RegenerativeAgriculture + #CarbonCredits) may represent the next wave of sustainable investment narratives. 新興標籤組合（如 #再生農業 + #碳信用）可能代表下一波可持續投資敘事。</li>
</ul>
</li>
</ol>
<p>應用場景：<strong>Monitoring</strong> the evolution of public sentiment on environmental issues, identifying misinformation propagation paths, and evaluating the effectiveness of corporate ESG communication. <strong>監測</strong> 公眾對環境議題的態度演變、識別虛假資訊傳播路徑、評估企業ESG溝通效果</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-marpit-scope-QnWY90hc="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="28" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="detecting-narrative-clusters-via-hashtag-affinity%E9%80%9A%E9%81%8E%E8%A9%B1%E9%A1%8C%E6%A8%99%E7%B1%A4%E8%A6%AA%E5%92%8C%E6%80%A7%E8%AD%98%E5%88%A5%E6%95%98%E4%BA%8B%E7%B0%87"><strong>Detecting Narrative Clusters via Hashtag Affinity通過話題標籤親和性識別敘事簇</strong></h3>

<p>Identify tightly linked hashtag groups that represent <code>coherent narratives</code> (e.g., “climate justice” vs. “energy security”). 從社交媒體資料中識別出 <code>緊密關聯的話題標籤（hashtag）群組</code>，這些群組共同構成具有語義一致性的<strong>公共敘事</strong>（如“氣候正義” vs. “能源安全”），從而揭示不同話語體系或輿論陣營。</p>
<ul>
<li>First, construct a User–Hashtag Bipartite Network 構建<strong>使用者–話題標籤</strong> 二分網路: Nodes include Users (Mode A) and Hashtags (Mode B). An edge represents a user employing a specific hashtag in a post節點包括：使用者（Mode A）與話題標籤（Mode B）。邊表示某用戶在某條帖子中使用了某個話題標籤。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-marpit-scope-Df3zpjra="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="29" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>Project to a Hashtag–Hashtag Network (Hashtag Affinity Network) 投影為 <strong>話題標籤</strong>–<strong>話題標籤</strong>網路（Hashtag Affinity Network）</li>
<li>Project to <strong>hashtag–hashtag</strong> network using <strong>Jaccard similarity</strong> to reduce noise from viral hashtags. 將二分圖單模投影到話題標籤層面，衡量任意兩個標籤的共現強度。採用 <strong>Jaccard</strong> <strong>相似係數</strong>（而非簡單共現頻次）以<strong>抑制病毒式熱門標籤的雜訊干擾</strong>。
<ul>
<li>Jaccard similarity is more sensitive to rare but highly overlapping tag combinations, helping to highlight consensus narratives within communities rather than generalized public trends. Jaccard 對稀有但高度重疊的標籤組合更敏感，有助於突出<strong>社群內部共識性敘事</strong>，而非大眾泛化熱點</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-marpit-scope-co0f3shX="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="30" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>
<p>Clustering 識別敘事簇:  Cluster using modularity or thresholding 。</p>
<ul>
<li><strong>Modularity Maximization 模組度優化</strong>: Utilize algorithms such as <code>Louvain</code> or <code>Leiden</code> to automatically discover highly cohesive topic communities by retaining strong connections and pruning weak ones 使用 Louvain 或 Leiden 等演算法，在保留強連接、切斷弱連接的前提下，自動發現高內聚的話題社區</li>
<li><strong>Similarity Thresholding 相似度閾值切割</strong>:  Retain only edges with a <code>Jaccard value</code> above a specific threshold (e.g., 0.1, or determined via statistical significance testing), then extract connected components as narrative clusters.僅保留 Jaccard 值高於某閾值（如 0.1 或經統計顯著性檢驗確定）的邊，然後提取連通子圖作為敘事簇</li>
</ul>
</li>
<li>
<p><strong>Narrative Interpretation and Naming 敘事解釋與命名:</strong> Perform thematic summarization on the hashtags within each cluster (using methods like keyword co-occurrence, word embedding clustering, or manual annotation) to assign interpretable narrative labels (e.g., &quot;Climate Justice,&quot; &quot;Green Tech,&quot; &quot;Energy Sovereignty&quot;). 對每個簇內的標籤進行主題歸納（如關鍵字共現、詞嵌入聚類、人工標注），賦予其可解釋的敘事標籤（如“氣候正義”、“綠色技術”、“能源自主”等）。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-marpit-scope-NXAUhmxX="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="31" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="tracking-emerging-hashtags-via-adamic-adar%E9%80%9A%E9%81%8E-adamic-adar-%E6%8C%87%E6%95%B8%E8%BF%BD%E8%B9%A4%E6%96%B0%E8%88%88%E8%A9%B1%E9%A1%8C%E6%A8%99%E7%B1%A4"><strong>Tracking Emerging Hashtags via Adamic-Adar通過 Adamic-Adar 指數追蹤新興話題標籤</strong></h3>

<p>Spot rising hashtags that are co-used by <strong>focused/niche users</strong> (not mass broadcasters), signaling authentic grassroots momentum. 識別正在興起的、由<strong>專注型或小眾用戶</strong>（而非大眾廣播者或網紅）共同使用的話題標籤（hashtags），以此捕捉真實、自下而上的<strong>草根動量</strong>（grassroots momentum）。</p>
<p><strong>Why Adamic-Adar?</strong> It gives more weight to co-occurrence by users who post <strong>few hashtags</strong> (likely intentional), vs. influencers who spam many. 在使用者–話題標籤二分網路中，兩個標籤的共現可能源於兩類截然不同的行為.</p>
<ul>
<li><strong>Focused Users專注用戶</strong>：These users post less frequently and employ hashtags judiciously. Consequently, the tags they co-use often reflect clear intent and semantic consistency. 發佈內容較少、使用標籤謹慎，其共用標籤往往具有**明確意圖和語義一致性。</li>
<li><strong>High-Volume/Broadcaster Users 高產/廣播型用戶</strong>（如網紅、行銷帳號）：These users deploy a large volume of hashtags to maximize exposure. This behavior often results in incidental or strategic co-occurrences that lack deep semantic association. 大量使用標籤以擴大曝光，導致偶然性或策略性共現，缺乏深層關聯。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-marpit-scope-LsPMGzmX="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="32" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>The Adamic-Adar Index favors the former group.<strong>Adamic-Adar 指數</strong>偏好前者. This is because it assigns <code>higher weight</code> to co-occurrences between users who publish fewer hashtags—such users are more likely to employ tags with clear intent. 因為它對<strong>發佈較少話題標籤的使用者</strong>之間的共現賦予更高權重——這類用戶使用標籤更可能是出於明確意圖；</p>
<p>In contrast, high-volume or influential accounts often use a large number of hashtags (&quot;hashtag stuffing&quot;), resulting in co-occurrence signals with greater noise. By penalizing the contribution of high-frequency neighbors (i.e., active hashtagging users), Adamic-Adar effectively highlights high-quality co-occurrence signals from focused users. 相比之下，高產或影響力大的帳號往往大量使用標籤（“刷標籤”），其共現信號雜訊更大。Adamic-Adar 通過懲罰高頻鄰居（即活躍發標用戶）的貢獻，有效突出了來自 <strong>專注使用者</strong> 的高品質共現信號。</p>
<p>A high AA value reflects hashtag co-occurrence driven by low-frequency, high-intent users, making it more likely to represent genuine community consensus or emerging narratives. <strong>高 AA 值</strong>反映的是<strong>由低頻、高意圖用戶驅動的標籤共現</strong>，更可能代表真實的社群共識或新興敘事</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-marpit-scope-HIeJzKKo="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="33" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h6 id="signal">Signal</h6>

<ul>
<li>
<p>High AA → meaningful alignment; low AA → accidental or spammy co-use ；High Adamic-Adar (AA) Value: Indicates that hashtag co-occurrence is driven by intentional niche users. This signals authentic grassroots momentum and warrants attention. 高 Adamic-Adar（AA）值 → 標籤共現由<strong>有意圖的小眾用戶</strong>驅動 → <strong>真實草根動量</strong>，值得關注</p>
</li>
<li>
<p>Low AA Value: Suggests co-occurrence stems primarily from high-volume broadcasters or random combinations. This is likely noise, marketing manipulation, or a fleeting trend, often resulting from accidental overlap or spammy/flooding usage (e.g., random or strategic hashtag stuffing by mass-posting accounts) 低 AA 值 →   共現主要來自<strong>高產廣播者</strong>或隨機組合 → 可能是噪音、行銷或短暫熱點. 更可能為<strong>偶然共現或垃圾式/氾濫式使用</strong>（如由大量發標用戶隨機或策略性堆砌標籤所致）。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-marpit-scope-4GbCEpaF="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="34" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="disinformation-detection-coordinated-inauthentic-behavior-%E8%99%9B%E5%81%87%E8%B3%87%E8%A8%8A%E6%AA%A2%E6%B8%AC%E8%AD%98%E5%88%A5%E5%8D%94%E5%90%8C%E6%80%A7%E9%9D%9E%E7%9C%9F%E5%AF%A6%E8%A1%8C%E7%82%BA"><strong>Disinformation Detection: Coordinated Inauthentic Behavior 虛假資訊檢測：識別協同性非真實行為</strong></h3>

<p>Find groups of accounts that <strong>unnaturally share the same niche hashtags</strong>—a sign of bot coordination. 發現一組帳號在<strong>小眾/低頻話題標籤</strong>上表現出異常一致的使用模式——這是自動化水軍（機器人啦 bots）或人工操控帳號進行 協同傳播（coordinated campaigning）的關鍵信號。</p>
<p><code>Signal 核心信號與指標</code></p>
<ul>
<li>High <strong>Common Neighbors</strong> on <code>rare hashtags</code> 在<code>罕見話題標籤</code>上具有高度共同鄰居（High Common Neighbors on Rare Hashtags）。In a user-hashtag bipartite network, if multiple accounts repeatedly co-appear under the same set of low-frequency hashtags (e.g., <code>#ObscurePolicy2026</code>, <code>#NicheTechX</code>)—tags that are rarely used by the general population—their behavior <strong>deviates from the randomness expected in natural grassroots participation</strong>.在使用者–標籤二分網路中，若多個帳號<strong>反復共同出現在同一組低頻標籤下</strong>（例如 <code>#ObscurePolicy2026</code>、<code>#NicheTechX</code>），而這些標籤在整體用戶中極少被使用，則表明其行為<strong>不符合自然草根參與的隨機性</strong>。</li>
<li>A high number of <strong>Common Neighbors (CN)</strong> indicates that these accounts form a &quot;<strong>dense subgraph</strong>&quot; connected via these tags, suggesting pre-scripted activity or centralized coordination.共同鄰居數量高 → 帳號之間通過標籤形成“密集子圖”，暗示<strong>預設腳本或集中指揮</strong></li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-marpit-scope-Zd4F28BB="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="35" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>Low diversity in hashtag usage per user <strong>用戶標籤使用多樣性極低</strong>: Real users typically employ a <strong>diverse range of hashtags</strong> across different posts, reflecting broad interests or contextual variations 真實用戶通常在不同帖子中使用<strong>多樣化標籤</strong>，反映興趣廣度或上下文變化。</li>
<li>Inauthentic accounts tend to <strong>repetitively use fixed hashtag combinations</strong> (e.g., always posting <code>#TruthNow + #WakeUpPeople + #HiddenAgenda</code>), resulting in significantly lower <strong>hashtag entropy</strong> or a low ratio of unique tags 水軍帳號則傾向於<strong>重複使用固定標籤組合</strong>（如始終發佈 <code>#TruthNow + #WakeUpPeople + #HiddenAgenda</code>），導致其標籤熵（entropy）或唯一標籤占比顯著偏低.  Individual accounts exhibit extremely low topic diversity, repeating a narrow, fixed set of tags without the contextual variation or interest breadth seen in real users 單個帳號的話題標籤使用多樣性極低：每個用戶僅重複使用固定、狹窄的一組標籤，缺乏真實用戶常見的語境變化或興趣廣度。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-marpit-scope-LfRhXaxW="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="36" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>為何這兩項指標結合有效？結合這兩項指標，可有效甄別 <code>偽裝成草根參與</code>、實則由<code>自動化或人工水軍</code>操控的協同傳播活動。</p>
<table>
<thead>
<tr>
<th><strong>指標</strong></th>
<th><strong>單獨使用風險</strong></th>
<th><strong>聯合優勢</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td>高 Common Neighbors</td>
<td>可能是真實小眾社群（如專業學者討論冷門議題）</td>
<td>若同時標籤多樣性低 → 排除真實興趣群體</td>
</tr>
<tr>
<td>低標籤多樣性</td>
<td>可能是專注型真實用戶（如只討論環保）</td>
<td>若同時與多人共用罕見標籤 → 揭示非自然協調</td>
</tr>
</tbody>
</table>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>Joint Criterion</strong>: A group of accounts using nearly identical, few tags, repeatedly appearing under the same obscure topics&quot; → **Highly likely to be an inauthentic influence operation **(astroturfing/botnet). “一群帳號用幾乎相同的少數標籤，反復出現在同一冷門話題下” → 極可能為<code>水軍</code>。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-marpit-scope-nWcViLzM="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="37" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>
<p><strong>Filter for Low-Frequency/Niche Hashtags篩選低頻/小眾標籤</strong>:</p>
<ul>
<li>Define &quot;<strong>Rare Hashtags</strong>&quot;: Tags used by fewer than a specific threshold of users globally (e.g., the bottom 5% by frequency).全網使用用戶數 &lt; 閾值（如前5%最低頻標籤）。</li>
<li>These tags possess <strong>high semantic specificity</strong>; the probability of organic overlap among normal users is naturally low這些標籤天然具有<strong>高語義特異性</strong>，正常用戶重合概率低。</li>
</ul>
</li>
<li>
<p><strong>Construct a Suspicious Sub-network構建可疑子網路</strong>:</p>
<ul>
<li>Extract all users who have engaged with these rare hashtags and their associated tag sets提取所有使用過罕見標籤的使用者及其標籤集合。</li>
<li>Calculate the **Common Neighbors **(CN) count between user pairs (i.e., the number of rare hashtags shared by two users 計算用戶對之間的 <strong>Common Neighbors</strong>（CN) 數量（即共同使用的罕見標籤數）。</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-marpit-scope-bRy9HzYm="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="38" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>
<p><strong>Identify High-Synergy Groups識別高協同群體</strong>: For user pairs with high CN values, conduct further checks on 對 CN 值高的用戶對，進一步檢查其：</p>
<p>§ <strong>Hashtag Diversity</strong>: (e.g., Unique Tags / Total Posts)<strong>標籤多樣性</strong>（如唯一標籤數 / 總發帖數）/ § <strong>Temporal Synchronicity</strong>: Whether posts were concentrated within a short time window<strong>時間同步性</strong>（是否在短時間內集中發帖）/ § <strong>Content Similarity</strong>: Text repetition rates or use of templated language<strong>內容相似度</strong>（文本重複率、範本化語言）</p>
</li>
<li>
<p><strong>Clustering and Labeling聚類與標記</strong>:</p>
<ul>
<li>Apply community detection algorithms (e.g., <strong>Louvain</strong>) to identify tight clusters within the high-CN user subgraph. 使用社區發現演算法（如 Louvain）在高 CN 用戶子圖中識別緊密集群。</li>
<li><strong>Flagging Criteria</strong>: If a cluster exhibits Low Diversity + High Common Neighbors + High Temporal Synchronicity, label it as &quot;Suspected Coordinated Inauthentic Behavior.&quot;若集群內用戶普遍呈現<strong>低多樣性</strong> <strong>+</strong> <strong>高</strong> <strong>CN +</strong> <strong>時間同步</strong>，則標記為“疑似協同非真實行為”。</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-marpit-scope-nstdjOj5="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="39" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h2 id="application-in-finance">Application in Finance</h2>

<p>Translate the <strong>Product Affinity Network</strong> to financial markets to <strong>monitor systemic risk, identify herding behavior</strong>, and <strong>reveal latent correlations beyond price movements</strong>. 將產品親和網路（Product Affinity Network）遷移至金融市場，用於<strong>監測系統性風險、識別羊群行為</strong>（herding），並<strong>揭示價格相關性之外的隱性關聯</strong>。</p>
<p><strong>Bipartite Network</strong>: <em>Investors投資者</em> <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> Stocks or Funds <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> Assets 資產（股票/債券/基金）</p>
<ul>
<li>
<p><strong>投資者</strong>（如對沖基金、養老基金、個人大戶）是一類節點；<strong>金融資產</strong>（如特斯拉股票、某綠色債券、比特幣）是另一類節點；</p>
<ul>
<li><strong>Mode A (Actors)</strong>: Institutional investors (hedge funds, mutual funds, pension funds), or even retail investor clusters</li>
<li><strong>Mode B (Affiliations)</strong>: Stocks, bonds, ETFs, cryptocurrencies, or companies</li>
<li><strong>Edge</strong>: Exists if an investor holds the asset (from 13F filings, portfolio disclosures, or brokerage data)</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-marpit-scope-wRmx8y4f="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="40" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li>When an investor holds an asset, a connection is established當某投資者持有某資產，即建立連接。例如：
<ul>
<li><strong>Bridgewater Associates</strong> holds both <strong>Apple</strong> and <strong>Microsoft</strong> → Creates edges: <code>Bridgewater — Apple</code> and <code>Bridgewater — Microsoft</code>§ 橋水基金（是全球最大的对冲基金） 持有 蘋果 和 微軟 → 橋水 — 蘋果，橋水 — 微軟</li>
<li>If multiple funds simultaneously hold significant positions in <strong>TSMC</strong> and <strong>ASML</strong> → This implies a <strong>'consensus allocation'</strong> within the semiconductor equipment/value chain sector.若多家基金同時重倉 <strong>台積電</strong> 和 <strong>阿斯麥</strong> → 暗示半導體設備/價值鏈板塊存在&quot;共識性配置&quot;。</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-marpit-scope-ND8kVrtl="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="41" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>Goal: Monitor systemic risk, detect herding, or uncover hidden correlations.</p>
<table>
<thead>
<tr>
<th>Marketing Concept</th>
<th>Finance Equivalent</th>
</tr>
</thead>
<tbody>
<tr>
<td>Product</td>
<td>Stock, Asset, Company</td>
</tr>
<tr>
<td>Customer</td>
<td>Investor, Hedge Fund, Mutual Fund</td>
</tr>
<tr>
<td>Co-purchase</td>
<td><strong>Co-holding</strong> (same investor owns both assets)</td>
</tr>
<tr>
<td>Product Affinity</td>
<td><strong>Portfolio-based asset correlation</strong></td>
</tr>
</tbody>
</table>
<p><strong>Core Idea:</strong> The <strong>&quot;affinity&quot;</strong> between assets stems not only from price co-movements but also from being <strong>strategically held by the same investor groups</strong>. <strong>資產之間的</strong>“親和力”不僅來自價格聯動，更源于被相同投資者群體戰略性持有.</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-marpit-scope-5lP76nis="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="42" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h4 id="metrics-in-action-1">Metrics in Action:</h4>
<ul>
<li><strong>Common Neighbors</strong>: How many funds hold both Stock A and Stock B? High count may indicate <strong>herding behavior</strong>. 同時持有股票 A 和 B 的基金數量。<strong>信號</strong>：若該數值異常高，可能反映<strong>羊群行為</strong>（herding）——大量機構同步押注相似資產組合，放大市場脆弱性。<strong>風險提示</strong>：在流動性緊張時，任一資產遭拋售可能觸發連鎖反應</li>
<li><strong>Jaccard Similarity</strong>: Normalized overlap in investor bases → reveals <strong>fundamental linkage</strong> beyond price correlation (e.g., ESG-focused funds holding both renewable energy firms). 歸一化處理，避免大市值資產因天然被廣泛持有而產生虛假關聯。<strong>洞察</strong>：高 Jaccard 值揭示<strong>基本面或策略層面的深層聯繫</strong>（如 ESG 基金群同時重倉兩家可再生能源公司），即使二者股價短期不相關。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-marpit-scope-AhYd9n6g="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="43" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<ul>
<li><strong>Adamic-Adar</strong>: If two obscure stocks are held together by a few specialized hedge funds (not mega-funds), that’s a stronger signal of <strong>strategic linkage</strong> than if they’re held by BlackRock (which owns everything). 若兩家冷門股票被<strong>少數專注型對沖基金</strong>（持倉集中）共同持有 → AA 值高 → <strong>強戰略關聯信號</strong>; 若僅被 BlackRock 等“全市場覆蓋型”巨無霸基金持有）→ 貢獻被大幅衰減 → 不視為有效關聯. <strong>價值</strong>：過濾“被動共現”，聚焦<strong>主動、有資訊含量的協同持倉</strong></li>
</ul>
<p><strong>Use case</strong>: During market stress, high co-holding similarity can predict <strong>contagion risk</strong>—if one stock drops, forced selling may spill over to its &quot;affiliated&quot; peers. 若 A 與 B 具有<strong>高共持相似性</strong>（高 Jaccard 或 AA），則 B 很可能被<strong>連帶拋售</strong>，即使其基本面未受影響。<strong>預警</strong>：提前識別高親和資產對，構建“<strong>持倉網路傳染圖譜</strong>”，輔助壓力測試與風險隔離。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-marpit-scope-IED4u9QZ="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="44" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p><strong>Application of Similarity Metrics</strong>：</p>
<ul>
<li>
<p><strong>Common Neighbors（共同持有人數量）</strong>：Quickly identifies <strong>&quot;crowded trades&quot;</strong>  (stocks held by many of the same funds)快速識別“抱團股”，Highly susceptible to noise from <strong>large index funds</strong> or ETFs that hold everything, creating false signals of affinity 但易受大型指數基金干擾。</p>
</li>
<li>
<p><strong>Jaccard相似度</strong>：Measures the <strong>proportion of overlap</strong> in the investor base, effectively filtering out <strong>scale bias</strong>衡量兩資產 <code>投資者基礎的重合比例</code>，過濾規模偏差。</p>
<blockquote>
<p>Stock A and Stock B are both held by <strong>5 funds</strong>. If Stock A is held by 6 funds total and Stock B by 7股A和B被5家基金同時持有，總持有基金數分別為6和7 → Jaccard = 5/(6+7−5) = 0.625，關聯性強。The <strong>high ratio</strong> indicates a very strong strategic link between these assets</p>
</blockquote>
</li>
<li>
<p><strong>Adamic-Adar指數</strong>：Places higher weight on co-holdings by <strong>specialized/niche investors</strong> (e.g., a fund that <em>only</em> invests in solar energy)更看重<strong>專業型投資者</strong>（如only 只投太陽能的基金）的共同持倉，認為其信號更可信。A co-holding signal from a <strong>focused expert</strong> is considered more significant and credible than one from a diversified generalist. It downweights the &quot;noise&quot; of broad-market holders and highlights <strong>high-conviction thematic links</strong>。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-marpit-scope-058uCTje="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="45" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="asset-affinity-network-for-alternative-risk-factors%E5%9F%BA%E6%96%BC%E5%85%B1%E5%90%8C%E6%8C%81%E5%80%89%E7%9A%84%E8%B3%87%E7%94%A2%E8%A6%AA%E5%92%8C%E7%B6%B2%E8%B7%AF%E6%8C%96%E6%8E%98%E5%8F%A6%E9%A1%9E%E9%A2%A8%E9%9A%AA%E5%9B%A0%E6%95%B8"><strong>Asset Affinity Network for Alternative Risk Factors基於共同持倉的資產親和網路：挖掘另類風險因數</strong></h3>

<p>Discover <strong>non-price-based relationships</strong> between assets (e.g., ESG alignment, thematic investing) using co-holding patterns. 通過機構投資者的<strong>共同持倉行為</strong>（co-holding patterns），構建<strong>資產親和網路</strong>，以發現超越價格相關性的<strong>非價格驅動關聯</strong>——如 ESG 一致性、主題投資邏輯（如“人工智慧”、“清潔能源轉型”）或戰略敘事對齊。</p>
<p>Why? Two stocks may have low price correlation but be held by the same ESG funds → they share <strong>fundamental or strategic linkage</strong>. 兩支股票即使價格走勢無關（甚至負相關），若被同一類專注型基金（如 ESG 基金、氣候主題基金）系統性地同時持有，則它們在<strong>基本面邏輯、風險暴露或投資敘事層面存在深層聯繫</strong>。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-marpit-scope-TpYnGXtb="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="46" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>Use <strong>Jaccard Similarity</strong> to normalize for popular assets (e.g., AAPL is held by everyone). 採用 <strong>Jaccard 相似度</strong> 計算資產對之間的共同持倉強度. 該指標能有效<strong>歸一化普遍持倉偏差</strong>（例如 AAPL 幾乎被所有基金持有），避免高流通性或熱門資產主導相似性結果，從而凸顯真正具有共同投資邏輯的資產對 。</p>
<ul>
<li><strong>The Blind Spot:</strong> Price correlation fails to capture asset linkages driven by <strong>investment philosophy, regulatory constraints, or strategic preferences</strong>. 價格相關性無法捕捉由<strong>投資理念、監管約束或策略偏好</strong>驅動的資產聯動。Two assets may move independently in normal markets but crash together when the specific investor base holding them reacts to a common trigger
<ul>
<li>股票 A（風電設備商）與股票 B（綠氫技術公司）價格相關性低；但均被“淨零碳排”主題基金重倉 → 在政策利好/利空 ESG 時可能<strong>同步遭遇資金流入/流出</strong>。<strong>風險含義</strong>：此類隱性關聯構成<strong>另類系統性風險因數</strong>（如“ESG 擠兌風險”），在市場壓力下可能引發跨資產傳染。</li>
</ul>
</li>
</ul>
<p><strong>關鍵優勢</strong>：<strong>Automatic Normalization of &quot;Popular Asset&quot; Bias</strong>自動歸一化熱門資產偏差: <strong>Apple (AAPL)</strong> is held by almost every fund. Consequently, its <strong>raw co-holding count</strong> with <em>any</em> other asset is artificially high, creating <strong>false associations</strong> (noise). 蘋果（AAPL）被幾乎所有基金持有 → 其與任何資產的<strong>簡單共持數量</strong>都很高，造成虛假關聯。By normalizing against the <strong>union</strong> (total unique holders), Jaccard penalizes pairs involving ubiquitous assets unless the overlap is proportionally massiveJaccard 通過<strong>並集歸一化</strong>，有效抑制此類偏差.</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>

<h3 id="systemic-risk-via-co-holding-contagion%E5%85%B1%E6%8C%81%E5%82%B3%E6%9F%93%E8%AD%98%E5%88%A5%E7%B3%BB%E7%B5%B1%E6%80%A7%E9%A2%A8%E9%9A%AA"><strong>Systemic Risk via Co-Holding Contagion共持傳染識別系統性風險</strong></h3>

<p>Identify asset pairs at risk of <strong>fire-sale contagion</strong>: if one drops, forced selling spills to its high-affinity partners. 識別因<strong>機構共同持倉</strong>而存在<strong>拋售傳染</strong>（fire-sale contagion）風險的資產對——即當某一資產價格暴跌引發強制平倉時，其高親和度的關聯資產可能因被同一群投資者持有而遭遇<strong>連帶拋售</strong>，即使二者基本面或價格走勢原本無關。</p>
<p><code>共持即耦合，耦合即傳染通道</code></p>
<ul>
<li>Under market stress conditions (e.g., <strong>liquidity crunches</strong>, <strong>massive redemptions</strong>, or <strong>margin calls</strong>), institutional investors are often forced to raise cash rapidly 在市場壓力下（如流動性緊縮、大規模贖回、保證金追繳），機構投資者往往<strong>無差別減持其持倉組合中的資產</strong>以快速回籠現金。</li>
<li>Instead of selectively selling based on fundamentals, they engage in <strong>indiscriminate deleveraging</strong>, reducing positions across their entire portfolio to meet liquidity needs. 若資產 A 與 B 被大量相同機構持有（<strong>高共持數量</strong>），則 A 的下跌可能觸發對 B 的<strong>非理性或被動拋售</strong>，形成“<strong>流動性驅動的跨資產溢出</strong>”。</li>
<li>Assets are sold not because they are &quot;bad,&quot; but simply because they are <strong>held</strong>. 這種風險<strong>獨立於價格相關性</strong>：即使 A 與 B 歷史回報不相關，只要它們在投資組合中“綁在一起”，就構成隱性系統性脆弱點。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-marpit-scope-Z8H7FrYI="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="48" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<p>Use <strong>Common Neighbors</strong> (raw co-holder count) as a proxy for liquidity linkage. High count = higher spillover risk. 以 Common Neighbors 作為流動性耦合代理指標。</p>
<ul>
<li><strong>Common Neighbors (CN) as a Risk Proxy</strong>： <strong>High CN Value:</strong> Indicates tight <strong>portfolio coupling</strong>. The assets are &quot;bundled&quot; together in the balance sheets of many major players。 CN值越高 →投資組合層面耦合越緊密 → 流動性衝擊下的拋售傳染風險越高。</li>
<li><strong>Risk Implication:</strong> Higher CN directly correlates with a higher probability of <strong>sell-off contagion</strong> during liquidity shocks. If one asset fails, the shared holders are the transmission mechanism for the crash。 <strong>風險排序與預警</strong>: 對全市場資產對按 CN 值排序，識別“高共持但低價格相關”的異常組合。在市場波動率上升或特定資產出現異常資金流出時，<code>優先監控其高-CN關聯資產</code>.</li>
</ul>
<p>When market volatility spikes or a specific asset experiences abnormal capital outflows, <strong>prioritize monitoring its high-CN partners</strong>。 一旦其中一資產遭遇流動性衝擊（如大幅下跌觸發贖回或保證金追繳），持有該資產的機構可能被迫同步減持其關聯資產，從而<strong>放大跨資產的拋售溢出風險</strong>。此方法尤其適用於監測系統性風險在非價格相關但持倉高度重疊的資產間的隱性傳導路徑。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-marpit-scope-rrLKmXCW="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="49" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="50" data-size="16:9">
<h3 id="uncovering-shadow-correlation-via-ownership-structure"><strong>Uncovering &quot;Shadow Correlation&quot; via Ownership Structure</strong></h3>
<ul>
<li><strong>Asset A:</strong> Regional Bank Stock：某區域性銀行股（Currently declining due to specific real estate exposure risks**近期因地產風險下跌）; **Asset B: An Infrastructure REIT（Fundamentals remain robust; traditionally <strong>uncorrelated</strong> with the banking sector in terms of industry classification or price history. 基本面穩健，與A行業無關）
<ul>
<li><em>CN</em>(<em>A</em>,<em>B</em>)=120, 120 家共同持有機構</li>
<li>Asset A continues to fall, triggering a wave of <strong>fund redemptions</strong> and <strong>margin calls</strong> for the shared holders，these 120 institutions engage in <strong>synchronous selling</strong>. They are forced to liquidate Asset B 這120家機構可能同步減持B以補流動性 → not because its fundamentals have changed, but simply because it is a liquid asset in their portfolio that can be sold to cover losses in Asset A. B價格非理性下跌 → 形成跨行業傳染。</li>
</ul>
</li>
</ul>
<p><code>Shadow Correlation</code>隱藏在所有權結構中的“影子相關性”，It transforms risk management from reacting to price moves to anticipating structural vulnerabilities 為防範“黑天鵝”式連鎖反應提供早期預警能力。</p>

<h3 id="detecting-smart-money-signals-with-adamic-adar%E7%94%A8-adamic-adar-%E6%8C%87%E6%95%B8%E8%AD%98%E5%88%A5%E8%81%B0%E6%98%8E%E9%8C%A2%E4%BF%A1%E8%99%9F"><strong>Detecting &quot;Smart Money&quot; Signals with Adamic-Adar用 Adamic-Adar 指數識別“聰明錢”信號</strong></h3>

<p>Find asset pairs linked by <strong>specialized investors</strong> (not mega-funds), which may signal alpha. 通過機構持倉網路，發現由<strong>專業化、高集中度投資者</strong>（如主題型對沖基金、主動管理人）共同持有的資產對，這些關聯更可能蘊含<strong>前瞻性觀點或超額收益信號</strong>（alpha），而非被動配置噪音。</p>
<p>Why Adamic-Adar?</p>
<ul>
<li>A high <strong>Adamic-Adar score</strong> between two assets indicates that they are linked by <strong>professional, active investors</strong> who have made a conscious decision to pair them 基金持倉越集中（∣N(f)∣∣N(<em>f</em>)∣ 越小），其作為“連接橋樑”的貢獻越大。</li>
</ul>
<p>Adamic-Adar transforms co-holding data from a simple count of &quot;who owns what&quot; into a <strong>quality-adjusted map of investor conviction</strong>, isolating the strategic moves of experts from the passive drift of the crowd Adamic-Adar 本質是資訊稀有性加權：越少見的共持行為，權重越高。 因此，高 AA 值的資產對更可能反映了<strong>由專業、主動型投資者驅動的戰略性關聯</strong>，是挖掘潛在 alpha 的有效線索。</p>
