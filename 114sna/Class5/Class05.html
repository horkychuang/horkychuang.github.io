<h2 id="information-cascade-%E8%B3%87%E8%A8%8A%E7%B4%9A%E8%81%AF">Information Cascade 資訊級聯</h2>

<p>An <strong>information cascade</strong> arises in a graph when nodes make adoption decisions <code>sequentially</code>, observing only the <strong>actions</strong> (adopted or not) of previous nodes, not their private signals. 資訊級聯是指在一個圖（graph）中，節點<code>依次</code>做出採納決策（adoption decision），<code>每個節點只能觀察到之前節點的行為（是否採納）</code>，而無法觀察到它們各自的<strong>私有信號</strong>。Classic theoretical model (Banerjee 1992, Bikhchandani–Hirshleifer–Welch 1992):</p>
<ul>
<li>Graph: usually assumed to be a countable infinite sequence (or sometimes a complete graph so everyone observes all previous actions). 通常假設為一個可數無限序列（或者有時假設為完全圖，使得每個人都能觀察到所有之前節點的行為）。</li>
<li>Each node v has:
<ul>
<li>A private binary signal <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.439ex;" xmlns="http://www.w3.org/2000/svg" width="8.059ex" height="1.946ex" role="img" focusable="false" viewBox="0 -666 3562.2 860"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msub"><g data-mml-node="mi"><path data-c="1D460" d="M131 289Q131 321 147 354T203 415T300 442Q362 442 390 415T419 355Q419 323 402 308T364 292Q351 292 340 300T328 326Q328 342 337 354T354 372T367 378Q368 378 368 379Q368 382 361 388T336 399T297 405Q249 405 227 379T204 326Q204 301 223 291T278 274T330 259Q396 230 396 163Q396 135 385 107T352 51T289 7T195 -10Q118 -10 86 19T53 87Q53 126 74 143T118 160Q133 160 146 151T160 120Q160 94 142 76T111 58Q109 57 108 57T107 55Q108 52 115 47T146 34T201 27Q237 27 263 38T301 66T318 97T323 122Q323 150 302 164T254 181T195 196T148 231Q131 256 131 289Z"></path></g><g data-mml-node="mi" transform="translate(502,-150) scale(0.707)"><path data-c="1D463" d="M173 380Q173 405 154 405Q130 405 104 376T61 287Q60 286 59 284T58 281T56 279T53 278T49 278T41 278H27Q21 284 21 287Q21 294 29 316T53 368T97 419T160 441Q202 441 225 417T249 361Q249 344 246 335Q246 329 231 291T200 202T182 113Q182 86 187 69Q200 26 250 26Q287 26 319 60T369 139T398 222T409 277Q409 300 401 317T383 343T365 361T357 383Q357 405 376 424T417 443Q436 443 451 425T467 367Q467 340 455 284T418 159T347 40T241 -11Q177 -11 139 22Q102 54 102 117Q102 148 110 181T151 298Q173 362 173 380Z"></path></g></g><g data-mml-node="mo" transform="translate(1172.7,0)"><path data-c="2208" d="M84 250Q84 372 166 450T360 539Q361 539 377 539T419 540T469 540H568Q583 532 583 520Q583 511 570 501L466 500Q355 499 329 494Q280 482 242 458T183 409T147 354T129 306T124 272V270H568Q583 262 583 250T568 230H124V228Q124 207 134 177T167 112T231 48T328 7Q355 1 466 0H570Q583 -10 583 -20Q583 -32 568 -40H471Q464 -40 446 -40T417 -41Q262 -41 172 45Q84 127 84 250Z"></path></g><g data- 78L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z"></path></g></g></g></g></svg></mjx-container>（信號正確的概率 p &gt; 0.5）</li>
<li>Observes the adoption decisions of all previous nodes. 可以觀察到所有先前節點做出的採納決策</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-scope-vME9Ska7="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="3" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>Node v adopts if the inferred Bayesian posterior (based on observed actions) exceeds 0.5, even if its own signal says &quot;reject&quot;. 節點 v 的決策規則：如果根據所觀察到的行為推斷出的貝葉斯後驗概率 &gt; 0.5，則採納該行為——即使自己的私有信號建議“拒絕”。</li>
</ul>
<p>Result: With probability 1, after a finite number of steps, a cascade starts and <strong>everyone ignores their private signal forever</strong> → herd behavior. 結果：以概率 1，在有限步之後會出現資訊級聯（cascade），從此所有後續節點都永遠忽略自己的私有信號，形成從眾行為（herd behavior）。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-scope-sddVv2Ce="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="4" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h4 id="herd-behavior-%E5%BE%9E%E7%9C%BE%E8%A1%8C%E7%82%BA">Herd Behavior 從眾行為</h4>

<p>A newly opened restaurant is actually of <strong>poor</strong> quality (true state = 0). However, each customer receives a <strong>private signal</strong> that is correct with probability (i.e., a 60% chance the signal is accurate and a 40% chance it is wrong). Customers arrive sequentially; they can only observe whether previous customers entered the restaurant, but they cannot see others' private signals.一家新開的餐廳，真正品質其實是<code>差</code>的（真實狀態 = 0）， 但每個顧客都有一個私有信號，信號正確概率 p = 0.6（即有60%概率信號正確，40%概率錯誤）。顧客依次到達，只能看到前面的人是否進去吃飯，看不到別人的私有信號。</p>
<p>Customer A trusts their own signal directly: since , they decide to enter. Starting from Customer B, even if their own private signal explicitly indicates &quot;the restaurant is bad,&quot; the fact that they observe someone else having entered leads them to calculate a posterior probability still greater than 0.5. Consequently, they discard their own signal and follow the predecessor.A 直接相信自己信號：0.6 &gt; 0.5 , 進去吃飯. 從顧客 B 開始，即使他自己的信號明確告訴他“餐廳差”，但因為看到前面已經有人進去了，他計算出來的後驗概率仍然大於0.5，所以他放棄自己的信號，跟隨前面的人。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-lsar8M6F="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<p>Once two consecutive customers enter (regardless of whether their decisions were right or wrong), the posterior beliefs of all subsequent customers become completely dominated by this public history of &quot;2:0.&quot; No matter what their own private signals say, they will unconditionally follow suit. This marks the onset of an <strong>information cascade</strong>: from a certain point onward, all subsequent individuals permanently ignore their private information, falling into <strong>herd behavior</strong>. 一旦有兩個人連續都進去（無論對錯），後面所有顧客的後驗信念都會被徹底被“2∶0”這個公開行為史支配，不管他們自己信號是什麼，都會無條件跟進。這就是**資訊級聯（資訊瀑布）**啟動了：從某一步開始，所有後續人都永遠忽略自己的私有資訊，陷入從眾（herd behavior）。</p>
<p>In this example, although the restaurant is actually poor, the first customer's incorrect signal (&quot;good&quot;) triggers a cascade, causing the next 9,999 customers to all mistakenly enter. This results in a completely erroneous collective outcome, yet it is generated rationally step-by-step. This is the most classic and simplest case of an information cascade在這個例子中，餐廳其實是差的，但第1個顧客的錯誤信號（好）觸發了級聯，導致後面9999個顧客全部錯誤地進去吃飯——一個完全錯誤的群體行為，卻完全理性地逐個產生。這就是資訊級聯最經典、最簡單的案例。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-zXbDyrLq="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="6" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<p>Information Cascade = the real-world/social-science phenomenon of <code>herd behavior</code> caused by observational learning. 資訊級聯(Information Cascade) = 由觀察性學習引發的<code>從眾行為</code>這一現實世界/社會科學現象。</p>
<p>IC and LT models = the rigorous, scalable, graph-based computational models that capture and generalize exactly this phenomenon to arbitrary networks, making it possible to predict, maximize, or block cascades algorithmically. IC（獨立級聯）與 LT（線性閾值）模型 = 嚴謹且可擴展的、基於圖的計算模型，它們精確地捕捉並將這一現象推廣至任意網路結構，從而使得通過演算法預測、最大化或阻斷級聯成為可能。</p>
<p>Information Cascade is the herd behavior of real-world/social-science phenomenon, while graph-based computational diffusion models try to capture the phenomenon, making it possible to predict, maximize, or block cascades algorithmically. 簡而言之，<strong>資訊級聯</strong>是現實社會中的從眾現象，而<strong>基於圖的計算擴散模型</strong>則試圖對這一現象進行建模，以實現通過演算法對級聯進行預測、最大化或阻斷。</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-marpit-scope-mbOUr733="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="7" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h2 id="general-framework-of-diffusion-models-on-graphs">General Framework of Diffusion Models on Graphs</h2>
<h5 id="independent-cascade-ic-model-%E7%8D%A8%E7%AB%8B%E7%B4%9A%E8%81%AF%E6%A8%A1%E5%9E%8B">Independent Cascade (IC) Model 獨立級聯模型</h5>

<p>The <strong>Independent Cascade (IC) Model</strong> is a <code>probabilistic model</code> used to simulate how information, influence, or innovation spreads through a network. 獨立級聯模型 是一種用於資訊、影響力或創新如何在網路中傳播的<code>概率模型</code>。</p>
<ul>
<li><strong>The Core Idea:</strong> Influence is like a contagious disease but with a twist. When an active node (someone who knows the info) tries to influence a neighbor, it gets <strong>one single chance</strong> to succeed. 影響力的傳播類似於傳染病，但有一個關鍵區別。當一個活躍節點（已知曉資訊的人）嘗試影響其鄰居時，它只有<strong>一次機會</strong>成功。</li>
<li><strong>The Mechanism:</strong> If the attempt succeeds (based on a probability), the neighbor becomes active in the <em>next</em> time step and gets their own chance to influence <em>their</em> neighbors. If the attempt fails, that specific link can never transmit influence again from that node. 如果嘗試成功（基於特定概率），鄰居將在<em>下一個</em>時間步變為活躍狀態，並獲得機會去影響<em>它的</em>鄰居。如果嘗試失敗，該特定連結將無法再次從該節點傳遞影響力。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-marpit-scope-NQsaNzmn="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="8" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li><strong>The Process:</strong> It starts with a set of <strong>seed nodes</strong> and runs in discrete steps until no new nodes can be activated. 模型從一組<code>種子節點</code>開始，以離散的時間步運行，直到沒有新節點可以被啟動為止。</li>
</ul>
<h6 id="key-parameters">Key Parameters</h6>
<p>To run an IC simulation, you need three main components:</p>
<ol>
<li><strong>The Graph:</strong> A network where nodes represent individuals and edges represent social connections. 一個網路，其中節點代表個體，邊代表社會連接。</li>
<li><strong>Seed Nodes:</strong> The initial set of active nodes (the &quot;patient zero&quot; or early adopters) at time . 初始活躍節點集合（即“零號病人”或早期採用者）。</li>
<li><strong>Propagation Probability</strong> 傳播概率:
<ul>
<li>This is the probability that an active node successfully activates an inactive neighbor . 這是活躍節點 成功啟動其非活躍鄰居的概率。In the simplest version, is constant for all edges在最簡單的版本中， 對所有邊都是常數. In advanced versions, every edge can have its own specific probability . 在高級版本中，每條邊 可以擁有自己特定的概率 。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-marpit-scope-7cqTzSIB="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="9" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>
<p><strong>Herd Behavior:</strong> The IC model mathematically formalizes the &quot;Information Cascade&quot;. Even if a node has &quot;private information&quot; (represented here implicitly by not being connected to the seed), once enough neighbors activate, the probability of activation spikes, mimicking the rational decision to follow the crowd. IC 模型在數學上形式化了“資訊級聯”。即使一個節點擁有“私有資訊”（在此隱含地表現為未連接到種子節點），一旦足夠多的鄰居被啟動，其被啟動的概率就會激增，模仿了理性個體選擇跟隨大眾的行為。</p>
</li>
<li>
<p><strong>Intervention:</strong> By changing the <code>seeds</code> list, you can test strategies to <strong>maximize</strong> spread (Influence Maximization) or remove specific nodes/edges to <strong>block</strong> a cascade (e.g., stopping misinformation). 通過改變 seeds 列表，您可以測試<strong>最大化</strong>傳播的策略（影響力最大化），或者通過移除特定節點/邊來<strong>阻斷</strong>級聯（例如阻止虛假資訊傳播）</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-scope-pRjJ5553="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="10" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h5 id="linear-threshold-lt-model-%E7%B7%9A%E6%80%A7%E9%96%BE%E5%80%BC%E6%A8%A1%E5%9E%8B">Linear Threshold (LT) Model 線性閾值模型</h5>

<p>The <strong>Linear Threshold (LT) Model</strong> simulates spread based on <strong>cumulative peer pressure</strong> rather than a single probabilistic event. 線性閾值模型 是基於 <strong>累積同伴壓力</strong>（cumulative peer pressure）的傳播過程，而非單一的隨機事件。</p>
<ul>
<li><strong>The Core Idea:</strong> An individual adopts a behavior (or information) only when the <strong>total influence</strong> from their already-active neighbors exceeds a specific personal <strong>threshold</strong>. 個體只有在來自其已活躍鄰居的<strong>總影響力</strong>超過其特定的個人<strong>閾值</strong>時，才會採納某種行為（或資訊）。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-marpit-scope-MoZFInur="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="11" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>
<p>The Mechanism:</p>
<ol>
<li>Every node has a random <strong>threshold</strong>, usually between 0 and 1, representing its resistance to change. 每個節點都有一個隨機的<strong>閾值</strong>，通常在 0 到 1 之間，代表其對改變的抵抗力。</li>
<li>Every incoming edge from an <code>active neighbor</code> contributes a certain &quot;weight&quot; of influence. 來自每個<code>活躍鄰居</code>的入邊都會貢獻一定的“權重”影響力。</li>
<li>If the sum of weights from <code>active neighbors</code> the node's threshold, the node becomes active. 如果來自<code>活躍鄰居</code>的權重之和 該節點的閾值，該節點就會變為活躍狀態。</li>
</ol>
</li>
<li>
<p><strong>Key Difference from IC:</strong> In IC, one strong connection might trigger activation instantly. In LT, it often takes <strong>multiple</strong> active neighbors to &quot;push&quot; a node over the edge. This models scenarios where people need social validation from several sources before acting. 在 IC 模型中，一個強連接可能瞬間觸發啟動。而在 LT 模型中，通常需要<strong>多個</strong>活躍鄰居共同作用，才能將節點“推過”臨界點。這類比了人們需要從多個來源獲得社會驗證後才會採取行動的場景。</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-marpit-scope-UWInkcGD="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="12" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h6 id="key-parameters-1">Key Parameters</h6>
<ol>
<li><strong>The Graph:</strong> The network structure. / <strong>Seed Nodes :</strong> The initial set of active nodes. 初始活躍節點集合。</li>
<li><strong>Edge Weights</strong>:  The strength of influence from node to node 從節點 到 節點 的影響力強度。
<ul>
<li>Often normalized so that for any node , the sum of incoming weights equals 通常進行歸一化處理，使得對於任意節點 ，其所有入邊權重之和等於 1。</li>
</ul>
</li>
<li><strong>Node Thresholds</strong> 節點閾值:  A value assigned to each node (randomly drawn, e.g., from a uniform distribution). 分配給每個節點 的值（通常隨機抽取，例如服從均勻分佈 ）。
<ul>
<li><strong>Low</strong> : Easy to influence (early adopter) 易受影響（早期採用者）/ <strong>High</strong> : Resistant to influence (skeptic). 抗拒影響（懷疑論者）</li>
</ul>
</li>
</ol>
<p>IC: <strong>Probabilistic Push</strong>: One neighbor tries to &quot;infect&quot; you 一個鄰居嘗試“感染”你. LT: <strong>Cumulative Pull</strong>: You activate when enough neighbors are active 當足夠多的鄰居活躍時，你被啟動</p>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-oSwVTH2g="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="13" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li><strong>Institutional Herding:</strong> The LT model perfectly captures the behavior of <code>fund managers</code> waiting for a <code>critical mass</code> of peers to hold a stock before they feel safe to enter (avoiding being the only one wrong). LT 模型完美捕捉了<code>基金經理</code>的行為——他們往往等待持有某檔股票的同行達到<code>臨界多數</code>後，才覺得安全並跟進（避免成為唯一犯錯的人）</li>
<li><strong>Tipping Points:</strong> The random threshold represents the specific internal risk tolerance or regulatory constraint of each investor. The model helps identify which small set of seeds can trigger a system-wide &quot;regime shift.&quot; 隨機閾值代表了每個投資者內部特定的風險承受能力或監管約束。該模型有助於識別哪一小部分種子節點可以觸發系統性的“制度轉變”。</li>
<li><strong>Blocking Cascades:</strong> In LT, you can stop a cascade by increasing the thresholds of key nodes (e.g., via regulation or education) rather than just cutting links. 在 LT 模型中，您可以通過提高關鍵節點的閾值（例如通過監管或教育），而不僅僅是切斷連接，來阻止級聯的發生。這對於防範系統性風險尤為重要。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-scope-EnFoZnHb="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="14" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h5 id="triggering-model-%E8%A7%A6%E7%99%BC%E6%A8%A1%E5%9E%8B">Triggering Model 触發模型</h5>

<p>The <strong>Triggering Model</strong> is a highly flexible framework where each node has a personal <strong>&quot;Triggering Set&quot;</strong> mechanism. <strong>觸發模型</strong>是一個高度靈活的框架，其核心在於每個節點都擁有一個 個性化的**觸發集合（Triggering Set）**機制。</p>
<ul>
<li><strong>The Core Idea:</strong> Instead of a fixed probability (like IC) or a cumulative sum (like LT), every node randomly selects a <code>subset</code> of its incoming neighbors <em>at the very beginning</em> of the process. This subset is called its <strong>Triggering Set</strong>. 與 IC 模型的固定概率或 LT 模型的累積求和不同，在觸發模型中，每個節點 在過程開始的<strong>最初時刻</strong>，會隨機選擇其入邊鄰居的一個<code>子集</code>。這個子集被稱為該節點的<strong>觸發集合</strong>。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-zBNNcSJB="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="15" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>The Mechanism:
<ol>
<li><strong>Selection Phase:</strong> Before the simulation starts, every node flips a coin for each of its incoming neighbors to decide: &quot;If <em>this</em> specific neighbor becomes active, will they be able to trigger me?&quot; The neighbors that get a &quot;Yes&quot; form the Triggering Set. 在模擬開始前，每個節點 對其每一個入邊鄰居“擲硬幣”決定：“如果<em>這個</em>特定的鄰居變活躍了，他能否觸發我？”那些得到“是”的鄰居就構成了觸發集合</li>
<li><strong>Activation Phase:</strong> During the simulation, if <strong>any single node</strong> in 's Triggering Set becomes active, then immediately becomes active. 在過程中，只要 的觸發集合中有<strong>任意一個</strong>節點變為活躍狀態，節點 就會立即變為活躍狀態。</li>
</ol>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-9JIP6FWA="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="16" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li><strong>Key Difference:</strong> It decouples the <em>probability of influence</em> from the <em>mechanism of activation</em>. It allows for complex correlations (e.g., &quot;I only listen to Node A OR Node B, but not C&quot;). 它將“影響力的概率”與“啟動的機制”解耦了。它允許複雜的邏輯關聯（例如：“我只聽命於節點 A <strong>或</strong> 節點 B，但不理會 C”）。</li>
<li>Generalization:
<ul>
<li>If the triggering set contains at most one neighbor with probability , it behaves like <strong>IC</strong>. 如果觸發集合最多只包含一個鄰居（概率為 ），它的行為就像 <strong>IC</strong> <strong>模型</strong>。</li>
<li>If the triggering set size follows a specific distribution based on weights, it can mimic <strong>LT</strong>. 如果觸發集合的大小遵循基於權重的特定分佈，它可以模仿 <strong>LT</strong> <strong>模型</strong>。</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-kzDqWK1l="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="17" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h6 id="key-parameters-2">Key Parameters</h6>
<ol>
<li>
<p><strong>The Graph:</strong> Directed network (influence usually flows one way). 通常是有向網路（影響力通常是單向流動的）。</p>
</li>
<li>
<p><strong>Seed Nodes:</strong> Initial active nodes. 初始活躍節點。</p>
</li>
<li>
<p><strong>Triggering Probabilities:</strong> For every edge, there is a probability that is included in 's Triggering Set. 對於每條邊 ，存在一個概率表示 被選入 的觸發集合的可能性。In the standard version, these are independent Bernoulli trials. 在標準版本中，這些是獨立的伯努利試驗。</p>
</li>
<li>
<p><strong>The Rule:</strong> Node activates if (i.e., if the intersection is not empty). 當且僅當 （即交集非空，意味著觸發集合中至少有一個鄰居已活躍）時，節點 啟動。</p>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-89Ku1GER="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="18" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol>
<li><strong>Institutional &quot;Trust Networks&quot;</strong>:
<ul>
<li>In finance, institutions don't just look at <em>anyone</em> holding a stock (LT) nor do they react to every single trade (IC). They have a specific <strong>Watch List</strong> or <strong>Peer Group</strong> (e.g., other ESG-focused funds, or specific aggressive investors). 在金融領域，機構不僅僅看<em>任何人</em>持有了某檔股票（LT 模型），也不對每一筆交易都做出反應（IC 模型）。他們有一個特定的<strong>觀察名單 (Watch List)</strong> 或 <strong>同行組</strong> (Peer Group)（例如其他 ESG 專注基金，或特定的激進投資者）。
<ul>
<li>Fund A only reacts if Fund B (whom they respect) enters the position. Fund C entering means nothing to Fund A. This maps directly to your interest in <strong>&quot;Strategic Holding by the Same Investor Group.&quot;</strong> 觸發模型完美捕捉了這一點：基金 A 只有在基金 B（他們尊重的對象）建倉時才會反應。基金 C 建倉對基金 A 毫無意義。這直接對應了您關注的<strong>被相同投資者群體戰略性持有</strong>的概念。</li>
</ul>
</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-marpit-scope-zRPNtUbk="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="19" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="2">
<li>
<p><strong>Filtering Noise</strong>:</p>
<ul>
<li>The &quot;Triggering Set&quot; acts as a filter. Even if 100 random people buy a stock, if none of them are in your specific Triggering Set, you remain inactive. This models <strong>rational filtering</strong> better than LT. 在觸發模型中，<code>觸發集合</code>充當了篩檢程式。即使有 100 個隨機人買入某檔股票，如果他們都不在你的特定觸發集合中，你依然保持不活躍。這比 LT 模型更好地類比了<strong>理性過濾</strong>行為。</li>
</ul>
</li>
<li>
<p><strong>Stealth Co-Accumulation:</strong></p>
</li>
</ol>
<ul>
<li>If a group of investors secretly coordinates, they effectively place each other in their Triggering Sets with probability 1.0, while ignoring the rest of the market. This creates a tightly coupled sub-graph that can trigger a cascade internally before leaking to the wider network. 如果一群投資者秘密協調，他們實際上是將彼此以 1.0 的概率放入對方的觸發集合中，而忽略市場的其餘部分。這會創建一個緊密耦合的子圖，能夠在內部觸發級聯，然後在洩露給更廣泛的網路之前完成建倉。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-marpit-scope-S2cx09pC="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="20" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h2 id="influence-maximization-im-%E5%BD%B1%E9%9F%BF%E5%8A%9B%E6%9C%80%E5%A4%A7%E5%8C%96">Influence Maximization (IM) 影響力最大化</h2>

<p><strong>Influence Maximization (IM)</strong> is the optimization problem of finding <strong>the best set of &quot;seed&quot; nodes</strong> to start a cascade, such that the total number of eventually activated nodes (the <strong>spread</strong>) is maximized. 影響力最大化是一個優化問題，旨在尋找<code>最佳的種子節點集合</code>，以啟動級聯傳播，從而使最終被啟動的節點總數（即<code>傳播範圍</code>）最大化。</p>
<ul>
<li><strong>The Core Question:</strong> &quot;If I can only convince people to start a rumor (or buy a product), <em>which</em> people should I choose to ensure the rumor reaches the maximum number of people?&quot; “如果我只能說服 一個人開始傳播謠言（或購買產品），我應該選擇<code>哪個人</code>，才能確保謠言觸達的人數最多？”</li>
<li><strong>The Challenge:</strong> In a network with millions of nodes, checking every possible combination of seeds is computationally impossible (it's an NP-hard problem). 在一個擁有數百萬節點的網路中，檢查 個種子的每一種可能組合在計算上是不可行的（這是一個 <strong>NP-hard</strong> 問題）。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-marpit-scope-4bK4wenu="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="21" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li><strong>The Solution:</strong> We rely on a mathematical property called <strong>Submodularity</strong> (the &quot;diminishing returns&quot; effect) to use a <strong>Greedy Algorithm</strong> that guarantees a solution within <strong>63%</strong> of the optimal result, which is often good enough for real-world applications. 我們利用一個稱為<strong>次模性（Submodularity）</strong> 的數學性質（即“邊際收益遞減”效應），使用<strong>貪心演算法（Greedy Algorithm）</strong>。該演算法能保證找到的解至少是最優解的 <strong>63%</strong>，這在現實應用中通常已經足夠好。</li>
</ul>
<h6 id="key-concepts--parameters">Key Concepts &amp; Parameters</h6>
<ol>
<li><strong>Diffusion Model:</strong> The underlying rules of spread (IC, LT, or Triggering) defined in previous steps. 前幾步定義的傳播規則（IC, LT 或 Triggering）</li>
<li><strong>Budget:</strong> The number of seed nodes you are allowed to select. 允許選擇的種子節點數量</li>
<li><strong>Influence Spread:</strong> The expected number of active nodes at the end of the process, given a seed set . Since IC/LT/Triggering are probabilistic, is usually estimated by running the simulation many times (Monte Carlo simulations) and averaging the results. 給定種子集合 ，過程結束時活躍節點的期望數量。由於 IC/LT/Triggering 是概率性的， 通常通過運行多次模擬（蒙特卡洛模擬）並取平均值來估算。</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-marpit-scope-fpDEXOmH="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="22" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="4">
<li>
<p><strong>Submodularity:</strong> This is the magic property. It means that adding a node to a <em>small</em> set of seeds gives more marginal gain than adding to a <em>large</em> set of seeds 這是關鍵屬性。意味著將一個節點 加入到一個<em>小</em>的種子集合中，其帶來的邊際增益要大於將其加入到一個<em>大</em>的集合中。</p>
<ul>
<li><em>Analogy:</em> The first person you invite to a party adds a lot of value. The 100th person adds less value because most people already know someone there. 你邀請參加派對的第一個人價值巨大。第100個人的價值較小，因為大多數人已經認識派對上的其他人了。</li>
</ul>
</li>
<li>
<p><strong>Strategic Intervention (ESG &amp; Risk)</strong> 策略干預 (ESG 與風險):</p>
<ul>
<li><strong>Maximizing:</strong> If you want to promote a positive ESG narrative or a new sustainable investment strategy, IM tells you exactly which key institutions (hubs or bridges) to target first to trigger a market-wide shift. 如果您想推廣積極的 ESG 敘事或新的可持續投資策略，IM 會告訴您應該首先針對哪些關鍵機構（樞紐或橋樑節點），以觸發市場範圍的轉變。</li>
<li><strong>Blocking (Negative IM):</strong> Conversely, if you want to stop an &quot;ESG run&quot; or a panic sell-off, you can run IM on the <em>reverse</em> logic or identify the nodes whose removal minimizes the spread. These are your &quot;systemically important&quot; nodes for regulation. 反之，如果您想阻止“ESG 擠兌”或恐慌性拋售，您可以運行逆向邏輯的 IM，或者識別那些移除後能最小化傳播範圍的節點。這些就是您需要監管的“系統重要性”節點。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-marpit-scope-Q3tBebHz="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="23" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="2">
<li>
<p><strong>Identifying &quot;Hidden&quot; Influencers</strong>:</p>
<ul>
<li>Degree centrality (just counting connections) often fails. A node with moderate degree but positioned as a <strong>bridge</strong> between two dense clusters might be a better seed than a hub inside a single cluster. The Greedy IM algorithm naturally finds these <code>structural holes</code>. 度中心性（僅僅計算連接數）往往會失效。一個度中心性 中等但作為兩個密集集群之間<strong>橋樑</strong>的節點，可能比單個集群內部的樞紐節點是更好的種子。貪心 IM 演算法能自然地發現這些<code>結構洞</code>(Structural Holes)。</li>
</ul>
</li>
<li>
<p><strong>Cost-Benefit Analysis</strong>:</p>
<ul>
<li>The &quot;Diminishing Returns&quot; plot shows you when to stop spending resources. If the 4th seed adds very little extra spread compared to the 3rd, you know your budget is optimized at . “邊際收益遞減”圖表顯示了何時停止投入資源。如果第 4 個種子帶來的額外傳播範圍遠小於第 3 個，您就知道您的預算優化點在 。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-marpit-scope-HzpZZfTw="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="24" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h5 id="reverse-influence-sampling-ris-%E5%8F%8D%E5%90%91%E5%BD%B1%E9%9F%BF%E5%8A%9B%E6%8E%A1%E6%A8%A3">Reverse Influence Sampling (RIS) 反向影響力採樣</h5>

<p><strong>Greedy Algorithm</strong> was accurate but incredibly slow 雖然準確，但速度極慢 (O(k⋅N⋅Simulations).</p>
<ul>
<li>To pick just <strong>one</strong> seed, it had to simulate the spread for <strong>every single node</strong> in the network. 為了僅僅選擇<strong>一個</strong>種子節點，它必須對網路中的<strong>每一個節點</strong>都模擬一次傳播過程。</li>
<li>For a network with 100,000 nodes, that's 100,000 simulations per step. It becomes computationally impossible for large-scale analysis. 對於一個擁有 10 萬個節點的網路，每一步都需要進行 10 萬次模擬。對於大規模分析來說，這在計算上是不可行的。</li>
<li><strong>Greedy</strong>: Accurate but too slow for big data 準確但對於大資料太慢. <strong>RIS (TIM/IMM)</strong>: <strong>Fast AND Accurate.</strong> This is the industry standard for large-scale influence maximization today. <strong>既快又准</strong>。這是當今大規模影響力最大化的行業標準。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-marpit-scope-zRjtYaIY="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="25" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h6 id="easy-definition-of-ris">Easy Definition of RIS</h6>

<p><strong>Reverse Influence Sampling (RIS)</strong> flips the logic upside down. Instead of asking <em>&quot;If I start at Node A, how far does it spread?&quot;</em>, 將邏輯完全顛倒過來。它不再問“如果我從節點 A 開始，能傳播多遠？”<br />
It asks: <strong>If a random node v ended up activated, which seeds could have caused it?</strong> 如果一個隨機節點 v 最終被啟動了，那麼是哪些種子節點可能導致了它的啟動？</p>
<ul>
<li>The Core Idea:  Generate many &quot;Reverse Reachable Sets&quot; (RR-sets). 生成大量的<strong>反向可達集合</strong>（Reverse Reachable Sets, RR-sets）
<ol>
<li>Pick a random node v from the graph.</li>
<li>Simulate the diffusion process <strong>backwards</strong> from v. 從圖中隨機選擇一個節點 v</li>
<li>Collect all nodes that <em>could</em> have reached v in this specific random realization. This group is an <strong>RR-set</strong>. 從 v 開始<strong>反向</strong>模擬擴散過程, 收集在這個特定的隨機實現中<em>能夠</em>到達 v 的所有節點。這個群體就是一個 <strong>RR-set</strong>.</li>
</ol>
</li>
<li><strong>The Insight:</strong> If a node u appears in <strong>many</strong> different RR-sets, it means u has a high probability of influencing a large portion of the network. 如果一個節點 u 出現在<strong>許多</strong>不同的 RR-set 中，這意味著 u 有很高的概率去影響網路中的大部分節點。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-marpit-scope-YAFEmyUv="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="26" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>The Algorithm:
<ol>
<li>Generate enough RR-sets to cover the graph statistically. 生成足夠多的 RR-sets，以在統計上覆蓋整個圖</li>
<li>Solve a <strong>Maximum Coverage Problem</strong>: Pick k nodes that appear in the <em>maximum number</em> of RR-sets. 求解<strong>最大覆蓋問題（****Maximum Coverage Problem）</strong>：選擇 k 個出現在*最多 RR-sets 中的節點。</li>
<li>This can be solved extremely fast using a simple greedy approach on the sets, not the graph. 這可以通過在集合上運行簡單的貪心演算法來極快地解決，而不需要再對圖進行昂貴的模擬。</li>
</ol>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-marpit-scope-clYT96Q8="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="27" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol>
<li>Scalability to Financial Networks <strong>金融網路的可擴展性</strong>:
<ul>
<li>When analyzing networks with <strong>100,000+ nodes</strong> (e.g., <code>watts.strogatz.game(100000)</code>), the standard Greedy algorithm would take days or weeks to run on such data. 標準的貪心演算法在這樣的資料上運行可能需要數天甚至數周。</li>
<li><strong>RIS</strong> can solve the same problem in <strong>minutes or seconds</strong>. This makes it feasible to run daily risk assessments or real-time strategy simulations on full-market data. <strong>RIS</strong> 可以在<strong>幾分鐘甚至幾秒鐘</strong>內解決同樣的問題。這使得在完整的市場資料上進行每日風險評估或即時策略模擬成為可能。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-marpit-scope-I1omYnbG="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="28" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="2">
<li>Identifying Systemic Risk Sources <strong>識別系統性風險源</strong>:
<ul>
<li>In the context of <strong>&quot;ESG Run Risks&quot;</strong> or <strong>&quot;Stealth Co-Accumulation&quot;</strong>, you don't just want to know who has the most connections (Degree). You want to know who has the highest probability of triggering a cascade across the <em>entire</em> system. 在 <strong>“ESG</strong> 擠兌風險 或 安靜協同建倉 的背景下，您不僅僅想知道誰的連接最多（度數）。您想知道誰最有概率觸發貫穿<em>整個</em>系統的級聯。</li>
<li>Nodes that appear frequently in RR-sets are the true &quot;systemic triggers.&quot; These are the institutions whose failure or strategic shift would ripple through the maximum number of other funds. 頻繁出現在 RR-sets 中的節點是真正的“系統性觸發器”。這些機構一旦失敗或發生戰略轉變，其漣漪效應將波及最多的其他基金。</li>
</ul>
</li>
<li>Robustness:
<ul>
<li>Because RIS relies on statistical sampling (Law of Large Numbers), it is robust against noise in the network structure. It averages out the randomness of individual edges, giving a clearer picture of structural importance. 由於 RIS 依賴於統計採樣（大數定律），它對網路結構中的噪音具有魯棒性。它平均掉了單個邊的隨機性，提供了更清晰的結構重要性圖景。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-marpit-scope-PK9X3zJJ="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="29" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h2 id="minimizing-spread-%E6%9C%80%E5%B0%8F%E5%8C%96%E5%82%B3%E6%92%AD">Minimizing Spread 最小化傳播</h2>

<p>It is also known as <strong>Negative Influence Maximization</strong> or <strong>Cascade Blocking</strong>). This is the critical defensive counterpart to Influence Maximization, essential for risk management. <strong>負面影響力最大化</strong>或<strong>級聯阻斷</strong>（Cascade Blocking）。這是影響力最大化的關鍵防禦對應面，對於風險管理至關重要。</p>
<p><strong>Minimizing Spread</strong> is the optimization problem of finding the best set of nodes to <strong>remove</strong>, <strong>immunize</strong>, or <strong>counter-act</strong> in order to stop a negative cascade (e.g., panic selling, misinformation, ESG run) from reaching as many people as possible. <strong>最小化傳播</strong>是一個優化問題，旨在尋找最佳的節點集合進行<strong>移除</strong>、<strong>免疫</strong>或<strong>反制</strong>，以阻止負面級聯（如恐慌性拋售、虛假資訊、ESG 擠兌）波及盡可能多的節點。</p>
<ul>
<li><strong>The Core Question:</strong> &quot;If a crisis starts (or has already started), which k nodes should we intervene with (by removing them, adding firewalls, or injecting positive news) to save the maximum number of other nodes?&quot; 如果危機已經開始（或即將開始），我們應該干預哪 k 個節點（通過移除它們、建立防火牆或注入正面資訊），以挽救最大數量的其他節點？</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-marpit-scope-2nF4gxwh="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="30" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ul>
<li>The Strategies:
<ol>
<li><strong>Node Removal (Immunization):</strong> Completely disconnecting key nodes (e.g., halting trading for specific institutions, isolating a server). <strong>節點移除（免疫）</strong>：完全斷開關鍵節點的連接（例如，暫停特定機構的交易，隔離伺服器）。</li>
<li><strong>Positive Counter-Cascade:</strong> Injecting a competing &quot;positive&quot; signal (e.g., official reassurance, buy orders) that competes with the negative one. If a node hears the positive signal first (or from a more trusted source), it becomes immune to the negative one. 正面反級聯（Positive Counter-Cascade）：注入競爭的“正面”信號（例如，官方安撫、買入指令），與負面信號競爭。如果一個節點先接收到正面信號（或來自更可信的來源），它將對負面信號免疫。</li>
</ol>
</li>
<li><strong>The Challenge:</strong> Like maximization, finding the <em>optimal</em> set is NP-hard. However, the objective function (number of saved nodes) is often <strong>supermodular</strong> (or the reduction in spread is submodular), allowing us to use similar Greedy or RIS-based algorithms with theoretical guarantees. 與最大化問題一樣，尋找<em>最優</em>集合是 NP-hard 問題。然而，目標函數（被挽救的節點數）通常具有<strong>超模性（supermodular）</strong>（或者傳播減少量具有次模性），這使得我們可以使用類似的貪心演算法或基於 RIS 的演算法，並獲得理論保證。</li>
</ul>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-marpit-scope-NGLkKKHE="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="31" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<h6 id="key-concepts--parameters-1">Key Concepts &amp; Parameters</h6>

<ol>
<li><strong>Threat Source (S_{bad}):</strong> The initial set of nodes spreading the negative influence (e.g., the first funds to sell). 傳播負面影響的初始節點集合（例如，第一批拋售的基金）。</li>
<li><strong>Budget (k):</strong> The number of nodes you can protect/remove or the number of positive seeds you can plant. 您可以保護/移除的節點數量，或可以種植的正面種子數量。</li>
<li>Competing Models:
<ul>
<li>In a <strong>Competing IC/LT Model</strong>, if a node is activated by the &quot;Positive&quot; campaign before the &quot;Negative&quot; one reaches it, the node is saved. 在<strong>競爭</strong> <strong>IC/LT</strong> <strong>模型</strong>中，如果節點在“負面”浪潮到達之前被“正面”活動啟動，則該節點被挽救。</li>
<li>Alternatively, removing a node reduces the network's connectivity, breaking the paths of the negative cascade. 或者，移除節點會降低網路的連通性，切斷負面級聯的路徑。</li>
</ul>
</li>
<li><strong>Objective:</strong> Minimize σ(Sbad) (the final size of the bad cascade) or Maximize Saved=N−σ(Sbad). 負面級聯的最終規模）或最大化 Saved=N−σ(Sbad)（被挽救的節點數）</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-marpit-scope-Sxe24P5W="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="32" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol>
<li><strong>Targeting Bridges vs. Hubs: 橋樑 vs. 樞紐</strong>
<ul>
<li>In many cases, the algorithm will choose to remove the <strong>seed itself</strong> (if allowed) as the first step. This is the most obvious &quot;cure.&quot; 在許多情況下，演算法第一步就會選擇移除<strong>種子節點本身</strong>（如果允許的話）。這是最直接的“治癒”方法。</li>
<li>If the seed cannot be removed (e.g., the crisis has already started inside a bank you can't close), the algorithm will likely target <strong>bridges</strong>—nodes that connect the infected cluster to the rest of the healthy network. This effectively quarantines the outbreak. 如果種子無法被移除（例如危機已經發生在一家不能關閉的銀行內部），演算法通常會瞄準<strong>橋樑節點</strong>——那些連接受感染集群與健康網路其餘部分的節點。這有效地將疫情<strong>隔離</strong>在局部。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-marpit-scope-NCC5rIy9="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="33" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="2">
<li><strong>Application to &quot;ESG Runs&quot;</strong>:
<ul>
<li><strong>Scenario</strong>: A rumor starts that Fund X is greenwashing. 謠言開始傳播，稱基金 X 存在“漂綠”行為。</li>
<li><strong>Action</strong>: The regulator identifies the top 3 funds that act as &quot;transmitters&quot; (high connectivity to other susceptible funds) and temporarily suspends their ability to trade or issues a strong clarifying statement specifically targeted at their immediate neighbors to &quot;cut the link.&quot; 監管機構識別出前 3 個充當“傳播者”的基金（與其他易感基金連接度高），並暫時暫停其交易能力，或向其直接鄰居發佈針對性的澄清聲明以“切斷連結”。</li>
<li><strong>Result</strong>: The rumor dies out locally instead of becoming a market-wide panic. 謠言在局部消亡，而不是演變成全市場的恐慌。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-marpit-scope-ylFyuq82="" data-color="#000" data-background-color="#fff" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-02-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="34" style="--color:#000;--background-color:#fff;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-02-05;--paginate:true;--theme:gaia;color:#000;background-color:#fff;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="34" data-size="16:9">
<ol start="3">
<li><strong>Application to &quot;Systemic Risk&quot;</strong>:
<ul>
<li>This models the concept of <strong>&quot;Too Connected to Fail&quot;</strong> in reverse. Instead of bailouts, it identifies which institutions represent such a high propagation risk that they require strict <strong>firewalls</strong> (capital controls, trading halts) to protect the broader system. 這反向模擬了**“大而不能倒” (Too Connected to      Fail)** 的概念。與其進行救助，不如識別哪些機構代表了極高的傳播風險，因此需要嚴格的<strong>防火牆</strong>（資本管制、交易暫停）來保護更廣泛的系統。</li>
</ul>
</li>
</ol>
<footer>Designed by Wen-Bin 2026-02-05</footer>
</section>
