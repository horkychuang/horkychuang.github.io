<h1 id="international-trade-theory-and-policy">International Trade: Theory and Policy</h1>
<p><strong>國企 Wen-Bin Chuang</strong><br />
<strong>2026-09-14</strong></p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-class="lead" data-theme="gaia" lang="zh-TW" class="lead" data-marpit-pagination="1" style="color:#000;" data-marpit-pagination-total="35" data-size="16:9" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-marpit-scope-65c3IX32="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="2" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h2 id="what-is-international-trade">What is International Trade</h2>

<p>Countries are interdependent, and how they interact economically profoundly affects prosperity, jobs, prices, innovation, inequality, and international relations. Ignoring it is like trying to understand a modern economy while pretending the rest of the world doesn’t exist.</p>
<p><strong>Gains from Trade (The Fundamental Reason)</strong></p>
<ul>
<li>Countries are not equally good at producing everything. Through <strong>comparative advantage</strong> (David Ricardo’s classic insight), nations can specialize in what they produce relatively more efficiently and trade for the rest.</li>
<li>Result: More total output, lower prices for consumers, and higher living standards for everyone involved — even if one country is absolutely better at producing everything.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-scope-hnC2fp0l="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="3" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>Access to Goods, Resources, and Ideas</strong></p>

<ul>
<li>No country has all the natural resources, technology, or climate needed for everything its citizens want (e.g., Japan imports oil and food; Saudi Arabia imports technology and cars).</li>
<li>Trade gives consumers <strong>variety and lower costs</strong> (your smartphone, clothes, coffee, medicine, etc., are cheaper and better because of global supply chains).</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-scope-WKqcONJf="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="4" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>Economic Growth and Development</strong></p>

<ul>
<li>Trade expands market size → encourages innovation, economies of scale, and competition.</li>
<li>Historically, countries that opened up to trade (East Asia in the late 20th century, China after 1978, post-WWII Western Europe) experienced rapid growth and poverty reduction.</li>
<li>Developing countries often use trade as a ladder out of poverty.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-Ws0H84BM="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>Global Challenges</strong></p>

<ul>
<li>Climate change (carbon leakage, border carbon adjustments)</li>
<li>Supply chain resilience (COVID-19 exposed vulnerabilities)</li>
<li>National security (critical minerals, semiconductors, rare earths)</li>
<li>Global poverty and development (trade vs. aid debate)</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-c5ocg9DA="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="6" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>For individuals</strong>: Better understanding of job markets, investment opportunities, and personal finance in a globalized world.</p>
<p><strong>For businesses</strong>: Deciding where to source, produce, or sell.</p>
<p><strong>For policymakers</strong>: Designing better economic strategies.</p>
<p><strong>For citizens</strong>: Making informed voting decisions instead of falling for simplistic slogans (&quot;trade is always good&quot; or &quot;trade is always bad&quot;).</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-marpit-scope-KAGKmjfJ="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="7" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="international-trade-and-domestic-trade">International Trade and Domestic Trade</h4>

<p>Domestic trade is like trading between Nautou and Tainan — same currency, same federal laws, easy movement of people. International trade is like trading between the US and China — different rules, different money, borders, politics, and security concerns.。</p>
<p>Because of these frictions, international trade is more complex and politically controversial than domestic trade. This is why we have entire fields of study (International Economics) and institutions (WTO, IMF, World Bank) dedicated to managing it.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-marpit-scope-i3gt3C32="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="8" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="importance-of-international-trade">Importance of International Trade</h4>

<p>International trade is a cornerstone of the modern global economy. It drives growth, efficiency, innovation, and human development on a massive scale.</p>
<h3 id="economic-growth-and-efficiency"><strong>Economic Growth and Efficiency</strong></h3>
<ul>
<li>Trade allows countries to specialize based on <strong>comparative advantage</strong>, leading to higher overall productivity and output.</li>
<li>It expands market size, enabling economies of scale and greater competition, which spurs innovation and efficiency.</li>
<li><strong>Global scale</strong>: World trade (goods + services) typically represents <strong>55–65% of global GDP</strong>. In recent years, trade volume has often grown faster than GDP, amplifying economic expansion.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-marpit-scope-njK6ff8a="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="9" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h3 id="lower-prices-and-greater-consumer-choice"><strong>Lower Prices and Greater Consumer Choice</strong></h3>

<ul>
<li>Imports increase competition and supply, reducing prices for everyday goods (electronics, clothing, food, medicine).</li>
<li>Consumers gain access to a wider variety of products and higher-quality goods that might not be available or affordable domestically.</li>
</ul>
<h3 id="job-creation-and-income-generation"><strong>Job Creation and Income Generation</strong></h3>

<ul>
<li>Export sectors create high-quality jobs (manufacturing, agriculture, services, tech).</li>
<li>Global supply chains support millions of jobs worldwide — from farmers in Brazil to factory workers in Asia to engineers in the US/Europe.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-marpit-scope-WhhtQdNi="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="10" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h3 id="innovation-technology-transfer-and-knowledge-spillovers"><strong>Innovation, Technology Transfer, and Knowledge Spillovers</strong></h3>

<ul>
<li>Exposure to international markets encourages firms to adopt new technologies and best practices.</li>
<li>Foreign direct investment (FDI) and trade in high-tech goods/services (e.g., AI-related trade) accelerate innovation.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-marpit-scope-ItY2OsOS="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="11" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h3 id="real-world-evidence-recent-context">Real-World Evidence (Recent Context)</h3>

<ul>
<li>In 2025, global trade showed resilience despite tensions, with strong growth in <code>AI-related</code> and advanced manufacturing goods.</li>
<li>Trade continues to be a key engine even amid geopolitical shifts, though it faces headwinds from tariffs and uncertainty.</li>
</ul>
<h6 id="not-automatic-benefits">Not Automatic Benefits</h6>
<p>While the overall gains are large, trade also creates winners and losers within countries (e.g., some industries decline). This is why complementary policies — education, worker retraining, social safety nets — are essential to maximize benefits and manage adjustment costs.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-marpit-scope-zaWnAzvU="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="12" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="thoery-of-international-trade">Thoery of International Trade</h4>

<p>International trade theories have evolved over time to better explain real-world patterns. Here's a structured overview of <code>Traditional (Classical)</code>, <code>New Trade Theory</code>, and <code>New New Trade Theory</code> (&quot;New-New&quot;)。</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-cdos4JlN="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="13" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="traditional-trade-theories-18th%E2%80%9319th-century">Traditional Trade Theories (18th–19th Century)</h4>

<p>These are <strong>country-level</strong> theories focused on <strong>why countries specialize and trade</strong> based on differences between them.</p>
<ul>
<li>
<p><strong>Absolute Advantage (Adam Smith, 1776)</strong> Countries should specialize in and export goods they can produce <code>more efficiently</code> (using fewer resources) than other countries. <strong>Why trade?</strong> Mutual benefit through higher total output. Example: One country is better at wine, another at cloth → both gain by specializing and trading.</p>
</li>
<li>
<p><strong>Comparative Advantage (David Ricardo, 1817)</strong> Even if one country is better at producing <em>everything</em> (absolute advantage), trade still benefits both if they specialize in goods with the <strong>lowest opportunity cost</strong>. <strong>Key insight</strong>: Trade is driven by <code>relative</code> efficiency differences, not absolute ones. This is the foundation of modern trade theory and explains why trade occurs even between unequal partners.</p>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-scope-vcmSkcUA="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="14" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<ul>
<li><strong>Heckscher-Ohlin (H-O) Model (20th Century extension)</strong> Countries export goods that intensively use their abundant factors of production (e.g., labor-abundant countries export labor-intensive goods; capital-abundant export capital-intensive ones).</li>
</ul>
<p>Limitations of Traditional Theories: They assume perfect competition, homogeneous products, constant returns to scale, and no trade between similar countries. They struggle to explain intra-industry trade (e.g., Germany and the US both exporting and importing cars).</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-xb2jlRSD="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="15" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="new-trade-theory-late-1970s%E2%80%931980s">New Trade Theory (Late 1970s–1980s)</h4>

<p>Developed mainly by <strong>Paul Krugman</strong> (Nobel Prize 2008). It addresses the shortcomings of traditional theories by incorporating <strong>economies of scale</strong> and <strong>imperfect competition</strong>.</p>
<p><strong>Core Ideas</strong>:</p>
<ul>
<li><strong>Increasing Returns to Scale</strong> (Economies of Scale): Larger production lowers average costs. Countries specialize to achieve scale, even without comparative advantage differences.</li>
<li><strong>Monopolistic Competition + Product Differentiation</strong>: Firms produce differentiated (branded) varieties. Consumers love variety → countries trade similar goods (intra-industry trade).</li>
<li><strong>Home Market Effect</strong>: Larger domestic markets attract more firms, leading to exports.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-lrHAlkRL="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="16" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>Why trade according to NTT?</strong> Trade allows firms to exploit economies of scale and meet consumer demand for variety. Much of modern trade (e.g., cars, electronics, aircraft between rich countries) is explained here, not just by factor endowments.</p>
<p>This theory also opened the door for strategic trade policy debates (governments potentially helping &quot;national champions&quot;).</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-PRrwsbsP="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="17" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h5 id="new-new-trade-theory-2000s%E2%80%93present">New New Trade Theory (2000s–present)</h5>

<p>Also called <strong>Heterogeneous Firms Trade Theory</strong>, pioneered by <strong>Marc Melitz</strong> (2003) and others. It shifts focus from countries or industries to <strong>individual firms</strong>.</p>
<p><strong>Core Ideas</strong>:</p>
<ul>
<li>Firms are heterogeneous (different productivity levels), not identical.</li>
<li>Only the <strong>most productive firms</strong> can afford the fixed costs of exporting (e.g., market research, distribution, compliance).</li>
<li>Trade liberalization → <strong>self-selection</strong>: High-productivity firms export and grow; low-productivity firms shrink or exit → raises average industry productivity.</li>
<li>Explains <strong>export vs. FDI</strong> decisions: Very productive firms invest abroad; moderately productive ones export.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-2aZKkC6t="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="18" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="why-trade">Why trade?</h4>

<p>International trade reallocates resources toward more efficient firms, drives productivity gains, innovation, and industry dynamics. It explains why only a small percentage of firms export, even in open economies.</p>
<table>
<thead>
<tr>
<th>Theory</th>
<th>Level of Analysis</th>
<th>Main Drivers of Trade</th>
<th>Key Explanation for &quot;Why Trade?&quot;</th>
<th>Real-World Strength</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Traditional</strong></td>
<td>Country</td>
<td>Differences in productivity or factors</td>
<td>Comparative advantage &amp; specialization</td>
<td>North-South trade, resource-based</td>
</tr>
<tr>
<td><strong>New (Krugman)</strong></td>
<td>Industry/Firm</td>
<td>Economies of scale + variety</td>
<td>Scale + consumer love for differentiated products</td>
<td>Intra-industry trade between similar countries</td>
</tr>
<tr>
<td><strong>New New (Melitz)</strong></td>
<td>Individual Firm</td>
<td>Firm productivity differences</td>
<td>Selection of productive firms + reallocation</td>
<td>Firm-level data, export behavior</td>
</tr>
</tbody>
</table>
<p>These theories are complementary, not contradictory. Traditional theories explain broad patterns between dissimilar countries, while New and New New better explain trade among similar advanced economies and firm-level realities in a globalized world.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-marpit-scope-YoPoMM9R="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="19" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="trade-policy">Trade Policy</h4>

<p>Trade policy refers to government actions that influence the flow of goods and services across borders. The two main categories of trade barriers (protectionist tools) are tariffs and non-tariff barriers</p>
<h4 id="tariffs">Tariffs</h4>
<p>Tariffs are <strong>taxes (duties) imposed on imported goods</strong> at the border. They make foreign products more expensive, aiming to protect domestic industries, generate government revenue, or address unfair practices (e.g., dumping).</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-marpit-scope-ivT1Mlm0="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="20" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="types-of-tariffs">Types of Tariffs</h4>

<ul>
<li><strong>Specific Tariff</strong>: Fixed fee per unit (e.g., $5 per barrel of oil).</li>
<li><strong>Ad Valorem Tariff</strong>: Percentage of the good’s value (e.g., 25% on imported cars).</li>
<li><strong>Compound Tariff</strong>: Combination of both.</li>
<li><strong>Tariff-Rate Quota (TRQ)</strong>: Low tariff up to a quota limit, then higher tariff.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-marpit-scope-t6CLiwKu="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="21" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="economic-effects-of-tariffs">Economic Effects of Tariffs</h4>

<ul>
<li><strong>Raises prices</strong> for consumers and businesses that rely on imports.</li>
<li>Protects domestic producers (higher prices → more domestic sales and jobs in protected sectors).</li>
<li>Generates revenue for the government.</li>
<li><strong>Deadweight loss</strong>: Overall economic inefficiency (higher prices reduce consumption; resources are misallocated).</li>
<li>Can lead to <strong>retaliation</strong> (trade wars), hurting exporters.</li>
<li>Incidence: Mostly borne by domestic consumers/importers (often near 100% pass-through).</li>
</ul>
<p>Recent examples (2025–2026) show tariffs raising consumer prices (e.g., in goods like clothing, electronics, and durables) and generating significant revenue but also contributing to inflationary pressures and lower GDP growth in some models</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-marpit-scope-pv6fxanW="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="22" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h2 id="non-tariff-barriers-ntbs-or-ntms">Non-Tariff Barriers (NTBs or NTMs)</h2>

<p>Non-tariff barriers are all other measures (besides tariffs) that restrict or distort trade. They are often more opaque, harder to measure, and potentially more restrictive than tariffs.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-marpit-scope-dgCeAE3C="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="23" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="common-types-of-ntbs">Common Types of NTBs</h4>

<ul>
<li><strong>Quotas</strong>: Direct limits on the quantity or value of imports.</li>
<li><strong>Import Licensing</strong>: Requirements for permits or approvals.</li>
<li><strong>Voluntary Export Restraints (VERs)</strong>: Exporter agrees to limit shipments (often under pressure).</li>
<li><strong>Technical Barriers to Trade (TBT)</strong>: Standards, testing, labeling, certification (e.g., safety or environmental requirements).</li>
<li><strong>Sanitary and Phytosanitary (SPS) Measures</strong>: Health and safety rules for food, animals, plants.</li>
<li><strong>Subsidies</strong>: Government support to domestic producers (makes imports relatively less competitive).</li>
<li><strong>Local Content Requirements</strong>: Must use a certain % of domestic inputs.</li>
<li><strong>Administrative/Customs Procedures</strong>: Delays, complex bureaucracy, or inspections.</li>
<li><strong>Government Procurement Rules</strong>: &quot;Buy national&quot; preferences.</li>
<li>Others: Embargoes, anti-dumping duties, currency controls.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-marpit-scope-ZAQfmGIA="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="24" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h4 id="economic-effects-of-ntbs">Economic Effects of NTBs</h4>
<ul>
<li>Increase compliance costs and uncertainty for exporters.</li>
<li>Can be disguised as legitimate regulations (health, safety, environment).</li>
<li>Often favor domestic firms more subtly than tariffs.</li>
<li>Higher impact on small/medium enterprises due to fixed compliance costs.</li>
<li>Can reduce trade volumes more than equivalent tariffs in some cases.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-marpit-scope-wec7FscR="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="25" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h2 id="tariffs-vs-non-tariff-barriers">Tariffs vs. Non-Tariff Barriers</h2>

<table>
<thead>
<tr>
<th>Aspect</th>
<th>Tariffs</th>
<th>Non-Tariff Barriers</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Nature</strong></td>
<td>Transparent tax on imports</td>
<td>Often regulatory, less transparent</td>
</tr>
<tr>
<td><strong>Visibility</strong></td>
<td>Easy to measure and negotiate</td>
<td>Harder to quantify and challenge</td>
</tr>
<tr>
<td><strong>Revenue</strong></td>
<td>Generates government revenue</td>
<td>Usually does not (except some fees)</td>
</tr>
<tr>
<td><strong>Flexibility</strong></td>
<td>Can be adjusted quickly</td>
<td>More persistent and discretionary</td>
</tr>
<tr>
<td><strong>WTO Discipline</strong></td>
<td>Heavily regulated (bound rates)</td>
<td>Subject to rules (TBT, SPS agreements) but more loopholes</td>
</tr>
<tr>
<td><strong>Modern Relevance</strong></td>
<td>Still important (e.g., recent U.S. tariffs)</td>
<td>Increasingly dominant as tariffs fell post-WTO</td>
</tr>
</tbody>
</table>
<p>Key Trend: After decades of tariff reductions through GATT/WTO, NTBs have become the primary tool (and concern) in trade policy.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-marpit-scope-9HrhA8BF="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="26" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h3 id="why-governments-use-them">Why Governments Use Them</h3>
<p><strong>Protectionism</strong>:</p>

<ul>
<li>Shield infant industries or declining sectors.</li>
<li>National security (e.g., steel, semiconductors).</li>
<li>Political reasons (protect jobs in key regions).</li>
<li>Correct market failures (e.g., environmental standards, unfair subsidies abroad).</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-marpit-scope-lkQQjkWf="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="27" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p><strong>Downsides</strong>:</p>

<ul>
<li>Higher consumer prices and lower variety.</li>
<li>Reduced efficiency and innovation due to less competition.</li>
<li>Retaliation and trade wars.</li>
<li>Harm to export sectors and global supply chains.</li>
<li>Regressive impact (hits lower-income households harder).</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>

<td><strong>Middle East</strong></td>
<td>+12.9%</td>
<td>+10.4%</td>
<td>Energy exports</td>
</tr>
<tr>
<td><strong>Africa</strong></td>
<td>+10.3%</td>
<td>+8.7%</td>
<td>Commodity exports</td>
</tr>
<tr>
<td><strong>South America</strong></td>
<td>+3.2%</td>
<td>+10.4%</td>
<td>Agricultural and mineral exports</td>
</tr>
</tbody>
</table>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-marpit-scope-oJqv3GhH="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="31" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p>While <strong>agriculture</strong> represents the physical foundation of global trade (food security, raw materials), <strong>services</strong> act as the invisible engine that makes modern agricultural trade possible (logistics, digital tracking, trade finance). In 2025, services trade grew at nearly double the rate of goods trade (~9% vs. ~4.6%), fundamentally transforming agriculture from a traditional commodity business into a highly optimized, data-driven global industry.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-marpit-scope-nOLZXnXI="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="32" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<p>The following table contrasts the macroeconomic scale and trajectory of agricultural goods versus global services.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Metric</th>
<th style="text-align:left">Agriculture (Merchandise/Goods)</th>
<th style="text-align:left">Services Trade</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Global Trade Value (2025)</strong></td>
<td style="text-align:left">Part of $26.26 Trillion (Total Goods)</td>
<td style="text-align:left"><strong>$9.56 Trillion</strong> (approx. 27% of total trade)</td>
</tr>
<tr>
<td style="text-align:left"><strong>2025 Volume/Value Growth</strong></td>
<td style="text-align:left">+4.6% (Goods overall)</td>
<td style="text-align:left"><strong>~9.0%</strong> (Outpacing goods significantly)</td>
</tr>
<tr>
<td style="text-align:left"><strong>2026 Growth Forecast</strong></td>
<td style="text-align:left">+1.9% (Slowing due to tariffs/geopolitics)</td>
<td style="text-align:left">+4.8% (Moderating but remaining robust)</td>
</tr>
<tr>
<td style="text-align:left"><strong>Primary Growth Drivers</strong></td>
<td style="text-align:left">Geopolitics, food security, climate/weather</td>
<td style="text-align:left">Digitalization, AI, travel recovery, ICT</td>
</tr>
<tr>
<td style="text-align:left"><strong>U.S. Trade Position (2025)</strong></td>
<td style="text-align:left">Exports: $175.6B</td>
<td style="text-align:left">Imports: $219.4B</td>
</tr>
</tbody>
</table>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-marpit-scope-503s8h9l="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="33" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<table>
<thead>
<tr>
<th><strong>United States</strong></th>
<th><strong>Top Tier Exporter</strong> ($175.6B). Major supplier to Asia and North America.</th>
<th><strong>Global #1 Exporter</strong> ($1.2T). Dominates digital, financial, and IP services.</th>
<th>Dual superpower. Massive services surplus offsets structural goods/ag deficits.</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>China</strong></td>
<td><strong>Top Tier Importer</strong>. Buys billions in U.S./global ag to ensure domestic food security.</td>
<td><strong>Fastest Growing</strong> (+8.2% in Q4 2025). Driven by travel, transport, and ICT.</td>
<td>Transitioning to a service-driven model while securing physical food imports.</td>
</tr>
<tr>
<td><strong>European Union</strong></td>
<td>High-value, quality-focused agri-food exporter (e.g., dairy, wine, processed foods).</td>
<td><strong>Mature Powerhouse</strong> (UK, Ireland, Germany). Strong in finance and business services.</td>
<td>Uses advanced services (legal, compliance) to enforce strict ESG standards on ag imports.</td>
</tr>
<tr>
<td><strong>Brazil &amp; Argentina</strong></td>
<td><strong>Commodity Giants</strong>. Top global exporters of soy, coffee, beef, and corn.</td>
<td>Growing, but heavily focused on supporting physical exports (basic logistics, transport).</td>
<td>Highly reliant on global transport and financial services to move bulk commodities.</td>
</tr>
<tr>
<td><strong>India</strong></td>
<td>Significant ag exporter (rice, spices) and growing processed food sector.</td>
<td><strong>Surging Growth</strong> in both services exports and imports (IT, software, business processes).</td>
<td>Leveraging IT services dominance to modernize and optimize domestic agricultural supply chains.</td>
</tr>
</tbody>
</table>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-marpit-scope-SZYffNbu="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="34" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<h3 id="the-agri-services-nexus">The Agri-Services Nexus</h3>

<p>Physical agricultural trade cannot exist at its current scale without specific service sectors. The table below maps how different service industries directly facilitate the global agriculture supply chain.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-marpit-scope-atntk44J="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="35" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="35" data-size="16:9">
<table>
<thead>
<tr>
<th style="text-align:left">Service Sector</th>
<th style="text-align:left">2025 Growth Rate</th>
<th style="text-align:left">Role in Global Agriculture</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Transport &amp; Logistics</strong></td>
<td style="text-align:left">+0.5%</td>
<td style="text-align:left">Moves bulk commodities (grains, fertilizers) via ocean freight and rail. Slow growth reflects rerouting (e.g., avoiding the Red Sea) which inflates landed food costs.</td>
</tr>
<tr>
<td style="text-align:left"><strong>Digitally Delivered (ICT)</strong></td>
<td style="text-align:left">+5.7%</td>
<td style="text-align:left">Powers &quot;AgriTech.&quot; Enables precision farming, IoT soil monitoring, blockchain traceability for food safety, and real-time supply chain visibility.</td>
</tr>
<tr>
<td style="text-align:left"><strong>Financial &amp; Insurance</strong></td>
<td style="text-align:left">Steady Growth</td>
<td style="text-align:left">Provides essential cross-border trade finance, currency hedging for commodity buyers, and crop/weather insurance to de-risk agricultural investments.</td>
</tr>
<tr>
<td style="text-align:left"><strong>Travel &amp; Tourism</strong></td>
<td style="text-align:left">+5.2%</td>
<td style="text-align:left">Drives demand for high-value, localized agricultural products (e.g., local wines, specialty foods) and facilitates international agri-business networking.</td>
</tr>
</tbody>
</table>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
