<p><strong>Gains from Trade</strong> refer to the increase in economic welfare (utility or real income) that a country achieves by engaging in international trade compared to <strong>Autarky</strong> (no trade situation).</p>
<p><strong>Core Idea</strong>: Even if a country is not more efficient in producing anything, it can still benefit from trade by <code>specializing</code> according to its <strong>comparative advantage</strong> and exchanging goods with other countries.</p>
<p>There are two main types of gains:</p>
<ul>
<li><strong>Static Gains</strong> (one-time improvement in <code>consumption possibilities</code>)</li>
<li><strong>Dynamic Gains</strong> (long-term benefits from technology, competition, scale, etc.)</li>
</ul>
<p>The idea that trade creates <code>mutual benefits</code> is one of the most important and robust insights in economics.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>

<tr>
<th>Source</th>
<th>Explanation</th>
<th>Type</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Comparative Advantage</strong></td>
<td>Countries specialize in goods they produce at lower opportunity cost</td>

<tr>
<td><strong>Economies of Scale</strong></td>
<td>Larger market allows firms to produce at lower average cost</td>

<td>Consumers get access to more varieties of goods and services</td>

<h2 id="ricardian-model-of-comparative-advantage">Ricardian Model of Comparative Advantage</h2>

<p>Comparative advantage, introduced by <code>David Ricardo in 1817</code>, explains why countries (or individuals/entities) benefit from specializing in and trading goods they can produce at a lower opportunity cost, even if one party has an absolute advantage in everything.</p>
<p><strong>Key Insight</strong>: Even if one country is absolutely more productive in everything, both countries can gain from trade by specializing according to <strong>comparative advantage</strong>.</p>
<p>We will build the model from the ground up, starting with our assumptions, moving to the Production Possibility Frontiers (PPFs), and finally demonstrating mathematically and graphically why free trade makes both countries better off.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-marpit-scope-nEGV94iv="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="5" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<h6 id="1model-setup-and-notation">1.Model Setup and Notation</h6>

<p>First, let’s establish our notation and the rules of our economic world.</p>

<li><strong>Technology (Unit Labor Requirements):</strong> We index goods by i. Let <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.357ex;" xmlns="http://www.w3.org/2000/svg" width="3.026ex" height="1.355ex" role="img" focusable="false" viewBox="0 -441 1337.5 598.8"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msub"><g data-mml-node="mi"><path data-c="1D44E" d="M33 157Q33 258 109 349T280 441Q331 441 370 392Q386 422 416 422Q429 422 439 414T449 394Q449 381 412 234T374 68Q374 43 381 35T402 26Q411 27 422 35Q443 55 463 131Q469 151 473 152Q475 153 483 153H487Q506 153 506 144Q506 138 501 117T481 63T449 13Q436 0 417 -8Q409 -10 393 -10Q359 -10 336 5T306 36L300 51Q299 52 296 50Q294 48 292 46Q233 -10 172 -10Q117 -10 75 30T33 157ZM351 328Q351 334 346 350T323 385T277 405Q242 405 210 374T160 293Q131 214 119 129Q119 126 119 118T118 106Q118 61 136 44T179 26Q217 26 254 59T298 110Q300 114 325 217T351 328Z"></path></g><g data-mml-node="TeXAtom" transform="translate(562,-150) scale(0.707)" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="1D43F" d="M228 637Q194 637 192 641Q191 643 191 649Q191 673 202 682Q204 683 217 683Q271 680 344 680Q485 680 506 683H518Q524 677 524 674T522 656Q517 641 513 637H475Q406 636 394 628Q387 624 380 600T313 336Q297 271 279 198T252 88L243 52Q243 48 252 48T311 46H328Q360 46 379 47T428 54T478 72T522 106T564 161Q580 191 594 228T611 270Q616 273 628 273H641Q647 264 647 262T627 203T583 83T557 9Q555 4 553 3T537 0T494 -1Q483 -1 418 -1T294 0H116Q32 0 32 10Q32 17 34 24Q39 43 44 45Q48 46 59 46H65Q92 46 125 49Q139 52 144 61Q147 65 216 339T285 628Q285 635 228 637Z"></path></g><g data-mml-node="mi" transform="translate(681,0)"><path data-c="1D456" d="M184 600Q184 624 203 642T247 661Q265 661 277 649T290 619Q290 596 270 577T226 557Q211 557 198 567T184 600ZM21 287Q21 295 30 318T54 369T98 420T158 442Q197 442 223 419T250 357Q250 340 236 301T196 196T154 83Q149 61 1 <li><strong>Labor Endowments:</strong> The total labor force available at home is <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.541ex" height="1.545ex" role="img" focusable="false" viewBox="0 -683 681 683"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D43F" d="M228 637Q194 637 192 641Q191 643 191 649Q191 673 202 682Q204 683 217 683Q271 680 344 680Q485 680 506 683H518Q524 677 524 674T522 656Q517 641 513 637H475Q406 636 394 628Q387 624 380 600T313 336Q297 271 279 198T252 88L243 52Q243 48 252 48T311 46H328Q360 46 379 47T428 54T478 72T522 106T564 161Q580 191 594 228T611 270Q616 273 628 273H641Q647 264 647 262T627 203T583 83T557 9Q555 4 553 3T537 0T494 -1Q483 -1 418 -1T294 0H116Q32 0 32 10Q32 17 34 24Q39 43 44 45Q48 46 59 46H65Q92 46 125 49Q139 52 144 61Q147 65 216 339T285 628Q285 635 228 637Z"></path></g></g></g></svg></mjx-container>, and abroad it is <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="2.528ex" height="1.565ex" role="img" focusable="false" viewBox="0 -691.8 1117.6 691.8"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D43F" d="M228 637Q194 637 192 641Q191 643 191 649Q191 673 202 682Q204 683 217 683Q271 680 344 680Q485 680 506 683H518Q524 677 524 674T522 656Q517 641 513 637H475Q406 636 394 628Q387 624 380 600T313 336Q297 271 279 198T252 88L243 52Q243 48 252 48T311 46H328Q360 46 379 47T428 54T478 72T522 106T564 161Q580 191 594 228T611 270Q616 273 628 273H641Q647 264 647 262T627 203T583 83T557 9Q555 4 553 3T537 0T494 -1Q483 -1 418 -1T294 0H116Q32 0 32 10Q32 17 34 24Q39 43 44 45Q48 46 59 46H65Q92 46 125 49Q139 52 144 61Q147 65 216 339T285 628Q285 635 228 637Z"></path></g><g data-mml-node="mo" transform="t <li><strong>Labor Mobility:</strong> Labor is <strong>perfectly mobile</strong> between industries <code>within</code> each country (a worker can easily switch from making X to making Y). However, labor is <strong>completely immobile</strong> <em>across</em> countries (workers cannot migrate from home to foreign).</li>

<h6 id="2-the-production-possibility-frontier-ppf">2. The Production Possibility Frontier (PPF)</h6>

<p>Because labor is the only factor of production and the MPL is <code>constant</code>, the Production Possibility Frontier (PPF) for each country is a <strong>straight line</strong>. The slope of the PPF represents the <strong>opportunity cost</strong> of producing good X in terms of good Y.</p>

<h6 id="3-identifying-comparative-advantage">3. Identifying Comparative Advantage</h6>

<p>Now, let’s introduce <strong>Comparative Advantage</strong>. A country has a comparative advantage in a good if it can produce it at a <code>lower opportunity cost</code> than the other country. Suppose the <strong>home country has a comparative advantage in producing good X</strong>. This means the opportunity cost of X at home is lower than abroad: <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.623ex;" xmlns="http://www.w3.org/2000/svg" width="20.343ex" height="2.319ex" role="img" focusable="false" viewBox="0 -750 8991.7 1025.2"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msub"><g data-mml-node="mi"><path data-c="1D44E" d="M33 157Q33 258 109 349T280 441Q331 441 370 392Q386 422 416 422Q429 422 439 414T449 394Q449 381 412 234T374 68Q374 43 381 35T402 26Q411 27 422 35Q443 55 463 131Q469 151 473 152Q475 153 483 153H487Q506 153 506 144Q506 138 501 117T481 63T449 13Q436 0 417 -8Q409 -10 393 -10Q359 -10 336 5T306 36L300 51Q299 52 296 50Q294 48 292 46Q233 -10 172 -10Q117 -10 75 30T33 157ZM351 328Q351 334 346 350T323 385T277 405Q242 405 210 374T160 293Q131 214 119 129Q119 126 119 118T118 106Q118 61 136 44T179 26Q217 26 254 59T298 110Q300 114 325 217T351 328Z"></path></g><g data-mml-node="TeXAtom" transform="translate(562,-150) scale(0.707)" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="1D43F" d="M228 637Q194 637 192 641Q191 643 191 649Q191 673 202 682Q204 683 217 683Q271 680 344 680Q485 680 506 683H518Q524 677 524 674T522 656Q517 641 513 637H475Q406 636 394 628Q387 624 380 600T313 336Q297 271 279 198T252 88L243 52Q243 48 252 48T311 46H328Q360 46 379 47T428 54T478 72T522 106T564 161Q580 191 594 228T611 270Q616 273 628 273H641Q647 264 647 262T627 203T583 83T557 9Q555 4 553 3T537 0T494 -1Q483 -1 418 -1T294 0H116Q32 0 32 10Q32 17 34 24Q39 43 44 45Q48 46 59 46H65Q92 46 125 49Q139 52 144 61Q147 65 216 339T285 628Q285 635 228 637Z"></path></g><g data-mml-n <h6 id="4-opening-to-free-trade-specialization">4. Opening to Free Trade: Specialization</h6>

<h6 id="5-the-gains-from-trade-consumption-beyond-the-ppf">5. The Gains from Trade: Consumption Beyond the PPF</h6>

<p>Production is only half the story; what matters to the citizens is <code>consumption</code>. Because they can now trade at the world relative price p, both countries face a new <strong>Budget Line</strong> (or terms of trade line) passing through their production points, with a slope of <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.439ex;" xmlns="http://www.w3.org/2000/svg" width="2.898ex" height="1.758ex" role="img" focusable="false" viewBox="0 -583 1281 777"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2212" d="M84 237T84 250T98 270H679Q694 262 694 250T679 230H98Q84 237 84 250Z"></path></g><g data-mml-node="mi" transform="translate(778,0)"><path data-c="1D45D" d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z"></path></g></g></g></svg></mjx-container> .</p>
<p><strong>Home Consumption:</strong> Starting from production point <strong>N</strong> (all X), the home country exports some of good X and imports good Y at the relative price p. They will choose to consume at the point where this budget line is tangent to their highest possible indifference curve. Let’s call this consumption point <strong>C</strong>.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-nyR0qosz="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="16" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<p><strong>Foreign Consumption:</strong> Starting from production point <strong>N</strong>* (all Y), the foreign country exports good Y and imports good X at price p. They will consume at the point where their budget line is tangent to their highest indifference curve. Let’s call this consumption point <strong>C</strong>*.</p>
<p><strong>The Magic of Trade:</strong> Look closely at points <strong>C</strong> and <strong>C*</strong> on your graph. Because the world price p lies between the two autarky slopes, the new budget lines are flatter than the foreign PPF and steeper than the home PPF.</p>
<p>As a result, the consumption points <strong>C</strong> and <strong>C*</strong> lie strictly <strong>above and outside</strong> their respective PPFs!</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-DSf7ViTa="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="17" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<p>Under <code>autarky</code>, a country could never consume outside its PPF; it was constrained by its <code>own production capabilities</code>. But under free trade, trade acts like a new technology. By specializing according to comparative advantage and trading, both countries achieve a consumption point that is physically impossible to reach under autarky.</p>
<p>Trade Equilibrium:</p>
<ul>
<li>Produce at Point <strong>N</strong> (more specialized in X).</li>
<li>Consume at Point <strong>C1</strong> (on a higher indifference curve).</li>
</ul>
<p><strong>Gains from Trade</strong>: The country moves from a lower indifference curve (C0) to a higher one (C1).</p>
<p>In a two-good model, gains from trade are shown by:</p>
<ul>
<li><strong>Consumption Possibility Frontier (CPF)</strong> expands outward when trade is allowed.</li>
<li>The country can reach a higher <strong>indifference curve</strong> (higher utility).</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>

<h6 id="6-terms-of-trade-tot">6. Terms of Trade (ToT)</h6>

<p><strong>Terms of Trade</strong> measures the <strong>relative price</strong> of a country’s exports compared to its imports.</p>

<h4 id="intuition"><strong>Intuition</strong></h4>

<p>When a country’s Terms of Trade improve, it means its export goods become relatively <strong>more valuable</strong> in the world market. This allows the country to:</p>
<ul>
<li>Import more goods and services for every unit it exports.
<ul>
<li>Reach a <strong>higher consumption possibility frontier</strong>.</li>
<li>Achieve a <strong>higher level of welfare</strong> (higher indifference curve).</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>

<h5 id="7-summary">7. Summary</h5>

<p>To wrap up today's lecture, here are the key takeaways:</p>
<ol>
<li><strong>Constant opportunity costs</strong> lead to linear PPFs.</li>
<li><strong>Comparative advantage</strong> is determined by comparing the slopes of the PPFs (opportunity costs).</li>
<li>When the world price p falls between the two autarky opportunity costs, it triggers <strong>complete specialization</strong> (Home produces only X, Foreign produces only Y).</li>
<li>By trading at price p, both countries can consume at points <strong>outside their PPFs</strong>, proving definitively that <strong>free trade is a positive-sum game</strong> and makes both nations better off than they were in autarky.</li>
</ol>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-marpit-scope-DVi040O4="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="22" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<h4 id="evidence-of-ricardian-model-of-comparative-advantage">Evidence of Ricardian Model of Comparative Advantage</h4>

<p>David Ricardo published his theory of comparative advantage in 1817. For over a century, it remained largely a theoretical construct. Testing it empirically was notoriously difficult because you have to measure &quot;labor productivity&quot; across different countries and link it directly to actual trade flows, while controlling for a myriad of other factors like capital, technology, and tariffs.</p>
<p>MacDougall decided to test the model by looking at two of the world's leading industrial powers at the time: <strong>the United States and the United Kingdom</strong>. He focused on 25 specific manufacturing industries.</p>
<p>When MacDougall plotted these 25 industries on a scatter graph—putting Relative Labor Productivity on the horizontal axis and Relative Export Performance on the vertical axis—the results were striking.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-marpit-scope-T7ol25PR="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="23" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<p>He found a <strong>remarkably strong, clear positive correlation</strong>.</p>
<ul>
<li>In industries where US workers were, say, twice as productive as UK workers (a productivity ratio of 2.0), US exports in that industry were also roughly twice as large as UK exports (an export ratio of 2.0).</li>
<li>Conversely, in the few industries where the UK actually had higher labor productivity than the US, the UK dominated the export markets for those specific goods.</li>
</ul>
<p>The data points clustered tightly around a 45-degree line, indicating an almost proportional relationship between relative productivity and relative export shares.</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>

<h2 id="revealed-preference-theory-rpt">Revealed Preference Theory (RPT)</h2>

<p><code>Revealed Preference Theory</code> can be used to prove gains from trade in a very elegant way — without needing to assume specific utility functions or indifference curves.</p>
<h4 id="1-direct-revealed-preference"><strong>1. Direct Revealed Preference</strong></h4>
<ul>
<li>
<p>Bundle <strong>A</strong> is <strong>directly revealed preferred</strong> to bundle <strong>B</strong> if:</p>
<ul>
<li>
<p>The consumer <code>chose</code> bundle <strong>A</strong>, and</p>
</li>
<li>
<p>Bundle <strong>B</strong> was affordable at the same time (i.e., cost of B ≤ income when A was chosen).</p>
</li>
</ul>
</li>
</ul>

397 689Q403 698 434 698Q463 698 471 689Q475 686 538 530T663 218L724 64Q724 62 776 62H828V0H817Q796 3 658 3Q509 3 485 0H472V62H517Q561 62 561 63L517 175H262L240 120Q218 65 217 64Q217 62 261 62H306V0H296ZM390 237L492 238L440 365Q390 491 388 491Q287 239 287 237H390Z"></path></g></g></g></g></g></svg></mjx-container>, then:</p>
<p><mjx-container class="MathJax" jax="SVG" display="true" style="margin: 0;"><svg style="vertical-align: -0.516ex; display: block; width: 100%; height: auto; max-height: 2.567ex;" xmlns="http://www.w3.org/2000/svg" width="8.838ex" height="2.567ex" role="img" focusable="false" viewBox="0 -906.6 3906.4 1134.6"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D431" d="M227 0Q212 3 121 3Q40 3 28 0H21V62H117L245 213L109 382H26V444H34Q49 441 143 441Q247 441 265 444H274V382H246L281 339Q315 297 316 297Q320 297 354 341L389 382H352V444H360Q375 441 466 441Q547 441 559 444H566V382H471L355 246L504 63L545 62H586V0H578Q563 3 469 3Q365 3 347 0H338V62H366Q366 63 326 112T285 163L198 63L217 62H235V0H227Z"></path></g><g data-mml-node="mi" transform="translate(640,413) scale(0.707)"><path data-c="1D400" d="M296 0Q278 3 164 3Q58 3 49 0H40V62H92Q144 62 144 64Q388 682 397 689Q403 698 434 698Q463 698 471 689Q475 686 538 530T663 218L724 64Q724 62 776 62H828V0H817Q796 3 658 3Q509 3 485 0H472V62H517Q561 62 561 63L517 175H262L240 120Q218 65 217 64Q217 62 261 62H306V0H296ZM390 237L492 238L440 365Q390 491 388 491Q287 239 287 237H390Z"></path></g></g></g><g data-mml-node="mo" transform="translate(1582.3,0)"><path data-c="227F" d="M84 710Q84 732 102 732Q115 732 119 722T125 696T137 652T171 597Q277 468 640 462H661Q694 462 694 442T661 422H640Q578 421 526 417T415 403T309 376T222 333T156 268T124 179Q122 162 118 158T103 153Q100 153 98 153T95 154T93 155T90 158T85 163Q83 167 83 176Q88 222 105 260T151 325T208 371T277 405T342 426T404 442Q401 443 380 447T345 456T302 469T245 492Q125 551 92 661Q84 695 84 710ZM56 -194Q56 -107 106 -51T222 6Q260 6 296 -12T362 -56T420 -108T483 -153T554 -171Q616 -171 654 -128T694 -29Q696 6 708 6Q722 6 722 -26Q722 -102 676 -164T557 -227Q518 -227 481 -209T415 -165T358 -113T294 -69T223 -51Q163 -51 125 -93T83 -196Q81 -228 69 -228Q56 -228 56 -202V-194Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(2638,0)"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D431" d="M227 0Q212 3 121 3Q40 3 28 0H21V62H117L245 213L109 382H26V444H34Q49 441 143 441Q247 441 265 444H274V382H246L281 339Q315 297 316 297Q320 297 354 341L389 382H352V444H360Q375 441 466 441Q547 441 559 444H566V382H471L355 246L504 63L545 62H586V0H578Q563 3 469 3Q365 3 347 0H338V62H366Q366 63 326 112T285 163L198 63L217 62H235V0H227Z"></path></g><g data-mml-node="mi" transform="translate(640,413) scale(0.707)"><path data-c="1D401" d="M720 510Q720 476 704 448T665 404T619 377T580 362L564 359L583 356Q602 353 632 342T690 312Q712 292 725 276Q752 235 752 189V183Q752 160 741 125Q698 18 547 2Q543 1 288 0H39V62H147V624H39V686H264H409Q502 686 542 681T624 655Q720 607 720 510ZM563 513Q563 553 548 578T518 611T486 622Q479 624 385 624H293V382H375Q458 383 467 385Q563 405 563 513ZM590 192Q590 307 505 329Q504 330 503 330L398 331H293V62H391H400H444Q496 62 528 75T580 131Q590 155 590 192Z"></path></g></g></g></g></g></svg></mjx-container></p><footer>Designed by Wen-Bin 2026-09-05</footer>

<h4 id="2-weak-axiom-of-revealed-preference-warp"><strong>2. Weak Axiom of Revealed Preference (WARP)</strong></h4>
<ul>
<li><strong>Statement</strong>: If bundle A is revealed preferred to bundle B, then bundle B should <strong>not</strong> be revealed preferred to bundle A. In other words:
<ul>
<li>If A is chosen when B is affordable → B should not be chosen when A is affordable.</li>
</ul>
</li>
</ul>
<p><strong>Violation of WARP</strong> = Inconsistent behavior (irrational choice).</p>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-marpit-scope-mAPkwYk0="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="27" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<ul>
<li>
<p>RPT provides one of the <strong>cleanest proofs</strong> that trade creates gains:</p>
<ul>
<li>In autarky, the country chooses consumption bundle <strong>A</strong>.</li>
<li>When trade opens, bundle <strong>A</strong> is still affordable (the country could still produce it).
<ul>
<li>But the country <strong>chooses</strong> a different bundle <strong>C</strong>. Therefore, by Revealed Preference: <strong>C is preferred to A</strong> → The country is better off.</li>
</ul>
</li>
</ul>
</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-marpit-scope-gXexglFh="" data-color="#000" data-background-color="#fef9e7;" data-background-image="url('images/background_1.JPG')" data-footer="Designed by Wen-Bin 2026-09-05" data-paginate="true" data-theme="gaia" lang="zh-TW" data-marpit-pagination="28" style="--color:#000;--background-color:#fef9e7;;--background-image:url('images/background_1.JPG');--footer:Designed by Wen-Bin 2026-09-05;--paginate:true;--theme:gaia;color:#000;background-color:#fef9e7;;background-image:url('images/background_1.JPG');background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="31" data-size="16:9">
<h4 id="proving-gains-from-trade-with-rpt">Proving Gains from Trade with RPT</h4>

<h4 id="setup">Setup:</h4>
<ul>
<li>Let <strong>A</strong> = <code>Autarky</code> consumption bundle. Let <strong>C</strong> = Consumption bundle under <code>free trade</code></li>
</ul>
<h4 id="key-argument">Key Argument:</h4>
<ul>
<li>
<p>In <strong>autarky</strong>, the consumer chooses bundle <strong>A</strong> at <code>domestic prices</code> (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="3.212ex" height="1.967ex" role="img" focusable="false" viewBox="0 -869.3 1419.8 869.3"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D443" d="M287 628Q287 635 230 637Q206 637 199 638T192 648Q192 649 194 659Q200 679 203 681T397 683Q587 682 600 680Q664 669 707 631T751 530Q751 453 685 389Q616 321 507 303Q500 302 402 301H307L277 182Q247 66 247 59Q247 55 248 54T255 50T272 48T305 46H336Q342 37 342 35Q342 19 335 5Q330 0 319 0Q316 0 282 1T182 2Q120 2 87 2T51 1Q33 1 33 11Q33 13 36 25Q40 41 44 43T67 46Q94 46 127 49Q141 52 146 61Q149 65 218 339T287 628ZM645 554Q645 567 643 575T634 597T609 619T560 635Q553 636 480 637Q463 637 445 637T416 636T404 636Q391 635 386 627Q384 621 367 550T332 412T314 344Q314 342 395 342H407H430Q542 342 590 392Q617 419 631 471T645 554Z"></path></g><g data-mml-node="mi" transform="translate(839.5,363) scale(0.707)"><path data-c="1D434" d="M208 74Q208 50 254 46Q272 46 272 35Q272 34 270 22Q267 8 264 4T251 0Q249 0 239 0T205 1T141 2Q70 2 50 0H42Q35 7 35 11Q37 38 48 46H62Q132 49 164 96Q170 102 345 401T523 704Q530 716 547 716H555H572Q578 707 578 706L606 383Q634 60 636 57Q641 46 701 46Q726 46 726 36Q726 34 723 22Q720 7 718 4T704 0Q701 0 690 0T651 1T578 2Q484 2 455 0H443Q437 6 437 9T439 27Q443 40 445 43L449 46H469Q523 49 533 63L521 213H283L249 155Q208 86 208 74ZM516 260Q516 271 504 416T490 562L463 519Q447 492 400 412L310 260L413 259Q516 259 516 260Z"></path></g></g></g></g></svg></mjx-container>). When the country opens to trade:</p>
<ul>
<li>The consumer faces <code>world prices </code>(<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="2.812ex" height="1.565ex" role="img" focusable="false" viewBox="0 -691.8 1243 691.8"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D443" d="M287 628Q287 635 230 637Q206 637 199 638T192 648Q192 649 194 659Q200 679 203 681T397 683Q587 682 600 680Q664 669 707 631T751 530Q751 453 685 389Q616 321 507 303Q500 302 402 301H307L277 182Q247 66 247 59Q247 55 248 54T255 50T272 48T305 46H336Q342 37 342 35Q342 19 335 5Q330 0 319 0Q316 0 282 1T182 2Q120 2 87 2T51 1Q33 1 33 11Q33 13 36 25Q40 41 44 43T67 46Q94 46 127 49Q141 52 146 61Q149 65 218 339T287 628ZM645 554Q645 567 643 575T634 597T609 619T560 635Q553 636 480 637Q463 637 445 637T416 636T404 636Q391 635 386 627Q384 621 367 550T332 412T314 344Q314 342 395 342H407H430Q542 342 590 392Q617 419 631 471T645 554Z"></path></g><g data-mml-node="mo" transform="translate(839.5,363) scale(0.707)"><path data-c="2217" d="M229 286Q216 420 216 436Q216 454 240 464Q241 464 245 464T251 465Q263 464 273 456T283 436Q283 419 277 356T270 286L328 328Q384 369 389 372T399 375Q412 375 423 365T435 338Q435 325 425 315Q420 312 357 282T289 250L355 219L425 184Q434 175 434 161Q434 146 425 136T401 125Q393 125 383 131T328 171L270 213Q283 79 283 63Q283 53 276 44T250 35Q231 35 224 44T216 63Q216 80 222 143T229 213L171 171Q115 130 110 127Q106 124 100 124Q87 124 76 134T64 161Q64 166 64 169T67 175T72 181T81 188T94 195T113 204T138 215T170 230T210 250L74 315Q65 324 65 338Q65 353 74 363T98 374Q106 374 116 368T171 328L229 286Z"></path></g></g></g></g></svg></mjx-container>). The value of the autarky bundle <strong>A</strong> at world prices is <strong>affordable</strong> under the trade budget (because the country can still produce A and trade at world prices). Mathematically:</li>
</ul>
</li>
</ul>

<p><strong>Key insight from RPT</strong>: The post-trade consumption bundle is chosen when the autarky bundle remains affordable (at the new prices and with trade income). Therefore, the post-trade bundle is <em>revealed preferred</em> to the autarky bundle. This directly demonstrates <strong>gains from trade</strong> without needing to measure utility explicitly:</p>
<ul>
<li>If choices are consistent (satisfy WARP/SARP), the economy as a whole (or representative agent) is better off.</li>
<li>The pattern of trade &quot;reveals&quot; the underlying comparative advantage: countries export goods in which they have a revealed lower opportunity cost.</li>
</ul>
<footer>Designed by Wen-Bin 2026-09-05</footer>
</section>
